<script>
// docx-js browser - constants only at top level
const PAGE_W   = 11906;
const ML       = 1795;
const MR       = 1418;
const MT       =  794;
const MB       =  623;
const BODY_W   = PAGE_W - ML - MR;
const TABLE_W  = BODY_W + 600;
const KAI = "標楷體";
const PT  = n => n * 2;
const sp = (before=0, after=0) => ({ before, after, line: 320, lineRule: "exact" });

let Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign,
    PageBreak, UnderlineType;

function initDocx() {
  if (!window.docx) { console.error("docx CDN not loaded"); return false; }
  ({ Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
     AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign,
     PageBreak, UnderlineType } = window.docx);
  return true;
}

async function generateAndDownloadDocx(data, filename) {
  if (!initDocx()) throw new Error("docx 程式庫未載入，請重新整理頁面");

  // All helpers defined here, after initDocx()
  const bNone  = { style: BorderStyle.NONE,   size: 0, color: "FFFFFF" };
  const bThin  = { style: BorderStyle.SINGLE, size: 4, color: "000000" };
  const all    = b => ({ top:b, bottom:b, left:b, right:b });
  const noBdr  = all(bNone);
  const thinBdr = all(bThin);
  const hdrBdr  = all({ style: BorderStyle.SINGLE, size: 4, color: "4472C4" });

  const run = (text, size=12, bold=false, color=undefined) =>
    new TextRun({ text, font: KAI, size: PT(size), bold, color });

  function para(text, opts={}) {
    const { size=12, bold=false, align=AlignmentType.LEFT, indent=0, before=0, after=60, color } = opts;
    return new Paragraph({
      alignment: align,
      spacing: sp(before, after),
      indent: indent ? { left: indent } : undefined,
      children: [run(text, size, bold, color)]
    });
  }
  const ctrPara = (text, size=12, bold=false) => para(text, { size, bold, align: AlignmentType.CENTER });
  const h2Para  = text => para(text, { size: 14, bold: true, before: 200, after: 60 });
  const h3Para  = (text, indent=480) => para(text, { size: 12, indent, before: 120, after: 40 });
  const emptyP  = () => para("", { size: 12, after: 0 });

  function cell(text, w, opts={}) {
    const { bold=false, size=12, shade, borders=thinBdr, span, valign=VerticalAlign.CENTER, color } = opts;
    const texts = Array.isArray(text) ? text : [text];
    return new TableCell({
      width: w ? { size: w, type: WidthType.DXA } : undefined,
      borders,
      shading: shade ? { fill: shade, type: ShadingType.CLEAR } : undefined,
      verticalAlign: valign,
      columnSpan: span,
      margins: { top: 60, bottom: 60, left: 180, right: 180 },
      children: texts.map(t => new Paragraph({
        spacing: sp(30, 30),
        children: [run(String(t||""), size, bold, color)]
      }))
    });
  }

  function hdrCell(text, w, span) {
    return cell(text, w, {
      bold: true, size: 12, shade: "BDD7EE", color: "1F3864",
      borders: hdrBdr, span
    });
  }

function buildPrescTable(prescStats) {
  if (!prescStats) return [para("（尚未上傳處方資料）", { indent: 480 })];
  const diff = (a, b) => {
    const c = parseFloat(a), p = parseFloat(b);
    if (isNaN(c)||isNaN(p)) return "";
    const d = c - p, isP = String(a).includes("%");
    return d===0 ? "0" : d>0 ? `+${isP?d.toFixed(1)+"%":d}` : `${isP?d.toFixed(1)+"%":d}`;
  };
  const ORDER = ["運動處方","營養處方","社會處方","情緒調適處方"];
  const rows = [
    ...ORDER.map(k => { const r = prescStats.rows.find(x=>x.label===k)||{}; return {label:k,...r}; }),
    { label:"處方開立總數(各處方加總)", isTotal:true, ...prescStats.total }
  ];
  // col widths for 10 cols: label + 9 data
  const lw = 2600, dw = Math.floor((TABLE_W - lw) / 9);
  const rem = TABLE_W - lw - dw * 9;
  const cw = [lw, dw, dw, dw, dw, dw, dw, dw, dw, dw + rem];

  return [new Table({
    width: { size: TABLE_W, type: "dxa" }, columnWidths: cw,
    rows: [
      new TableRow({ children: [
        hdrCell("健康處方類別", cw[0]),
        hdrCell("處方數", cw[1]+cw[2]+cw[3], 3),
        hdrCell("已執行處方數", cw[4]+cw[5]+cw[6], 3),
        hdrCell("處方執行率", cw[7]+cw[8]+cw[9], 3),
      ]}),
      new TableRow({ children: [
        cell("", cw[0]),
        ...["本週","上週","差異","本週","上週","差異","本週","上週","差異"].map((h,i) => hdrCell(h, cw[i+1]))
      ]}),
      ...rows.map(r => new TableRow({ cantSplit: true, children: [
        cell(r.label, cw[0], { size:12, bold: r.isTotal, shade: r.isTotal?"DEEAF1":undefined }),
        ...[r.open, r.prevOpen||0, diff(r.open,r.prevOpen||0),
            r.exec, r.prevExec||0, diff(r.exec,r.prevExec||0),
            r.rate, r.prevRate||"0%", diff(r.rate,r.prevRate||"0%")
           ].map((v,i) => cell(String(v), cw[i+1], { size:12, bold: r.isTotal, shade: r.isTotal?"DEEAF1":undefined }))
      ]}))
    ]
  })];
}

// ── clinic table ─────────────────────────────────────────────────
function buildClinicTable(clinics) {
  if (!clinics||!clinics.length) return [para("（尚未設定診所資料）", { indent: 480 })];
  const GROUPS = ["自有營養師","已媒合","有空間待媒合","無空間"];
  // 9 cols: 分類, 名稱, 教學時間, 電子簽章, 營養空間, 禮券, 開立, 執行, 備註
  const cw = [700, 1900, 1200, 700, 700, 600, 700, 700, TABLE_W - 700-1900-1200-700-700-600-700-700];
  
  const dataRows = [];
  GROUPS.forEach(grp => {
    const items = clinics.filter(c => c.group === grp);
    if (!items.length) return;
    items.forEach((c, i) => {
      dataRows.push(new TableRow({ children: [
        i === 0 ? new TableCell({
          width: { size: cw[0], type: "dxa" }, rowSpan: items.length,
          borders: thinBdr, verticalAlign: "center",
          shading: { fill: "DEEAF1", type: "clear" },
          margins: { top: 60, bottom: 60, left: 100, right: 100 },
          children: [new Paragraph({
            alignment: "center", spacing: sp(30,30),
            children: [run(grp, 12, true, "1F3864")]
          })]
        }) : null,
        cell(c.name||"",          cw[1], { size: 12 }),
        cell(c.teachTime||"",     cw[2], { size: 12 }),
        cell(c.eSig?"V":"",       cw[3], { size: 12 }),
        cell(c.nutrition?"V":"",  cw[4], { size: 12 }),
        cell(c.coupon?"V":"",     cw[5], { size: 12 }),
        cell(String(c.openCount||0), cw[6], { bold: true, size: 12 }),
        cell(String(c.execCount||0), cw[7], { bold: true, size: 12 }),
        cell(c.note||"",          cw[8], { size: 12 }),
      ].filter(Boolean)}));
    });
  });

  return [new Table({
    width: { size: TABLE_W, type: "dxa" }, columnWidths: cw,
    rows: [
      new TableRow({ children: [
        hdrCell("分類",cw[0]), hdrCell("診所名稱",cw[1]), hdrCell("預計實地教學時間",cw[2]),
        hdrCell("電子簽章",cw[3]), hdrCell("營養空間",cw[4]), hdrCell("禮券",cw[5]),
        hdrCell("開立",cw[6]), hdrCell("執行",cw[7]), hdrCell("備註",cw[8]),
      ]}),
      ...dataRows
    ]
  })];
}

// ── generic simple table ─────────────────────────────────────────
function buildSimpleTable(rows, cols, colWidths) {
  const filtered = (rows||[]).filter(r => r._keep !== false);
  if (!filtered.length) return [para("（無資料）", { indent: 480 })];
  const keys = cols.map((_, i) => i); // use positional
  return [new Table({
    width: { size: TABLE_W, type: "dxa" }, columnWidths: colWidths,
    rows: [
      new TableRow({ children: cols.map((c,i) => hdrCell(c, colWidths[i])) }),
      ...filtered.map(r => {
        const vals = Object.entries(r)
          .filter(([k]) => !k.startsWith('_'))
          .map(([,v]) => v);
        return new TableRow({ children: cols.map((_,i) => cell(String(vals[i]||""), colWidths[i], { size: 12 })) });
      })
    ]
  })];
}

// ── work report table ─────────────────────────────────────────────
function buildWorkTable(reports) {
  if (!reports||!reports.length) return [para("（尚未填寫工作進度）", { indent: 480 })];
  const lw = 1400, rest = TABLE_W - lw;
  const cw = [lw, Math.floor(rest/2), Math.ceil(rest/2)];
  return [new Table({
    width: { size: TABLE_W, type: "dxa" }, columnWidths: cw,
    rows: [
      new TableRow({ children: [hdrCell("報告人",cw[0]), hdrCell("近期工作執行情形",cw[1]), hdrCell("未來工作重點規劃",cw[2])] }),
      ...reports.map(r => new TableRow({ children: [
        cell(r.name||"", cw[0], { bold: true, size: 12 }),
        cell((r.recent||"").split("\n"), cw[1], { size: 12 }),
        cell((r.plan||"").split("\n"), cw[2], { size: 12 }),
      ]}))
    ]
  })];
}

// ── schedule / visit tables ───────────────────────────────────────
function buildScheduleTable(rows) {
  const filtered = (rows||[]).filter(r=>r._keep!==false);
  if (!filtered.length) return [para("（無）", { indent: 480 })];
  const cw = [2000, TABLE_W-2000-1800, 1800];
  return [new Table({
    width: { size: TABLE_W, type: "dxa" }, columnWidths: cw,
    rows: [
      new TableRow({ children: [hdrCell("時間",cw[0]),hdrCell("會議名稱",cw[1]),hdrCell("地點",cw[2])] }),
      ...filtered.map(r => new TableRow({ children: [cell(r.date||"",cw[0],{size:12}),cell(r.name||"",cw[1],{size:12}),cell(r.location||"",cw[2],{size:12})] }))
    ]
  })];
}

function buildVisitTable(rows) {
  const filtered = (rows||[]).filter(r=>r._keep!==false);
  if (!filtered.length) return [para("（無）", { indent: 480 })];
  const cw = [2200, TABLE_W-2200-1400, 1400];
  return [new Table({
    width: { size: TABLE_W, type: "dxa" }, columnWidths: cw,
    rows: [
      new TableRow({ children: [hdrCell("時間",cw[0]),hdrCell("拜會單位及人員",cw[1]),hdrCell("執行狀況",cw[2])] }),
      ...filtered.map(r => new TableRow({ children: [cell(r.date||"",cw[0],{size:12}),cell(r.unit||"",cw[1],{size:12}),cell(r.status||"",cw[2],{size:12})] }))
    ]
  })];
}

// ── tracked items: group by meeting, show full source + caseTitle ─
function buildTrackedItems(tracked) {
  if (!tracked||!tracked.length) return [para("（本次無列管追蹤事項）", { indent: 480 })];

  // Group by meeting name (strip item reference to get meeting name)
  const groups = {};
  tracked.forEach(item => {
    const src = item.source || "";
    // Extract meeting name: everything before 臨時動議/討論事項/報告事項
    const meetKey = src.replace(/(臨時動議|討論事項|報告事項).*$/, "").trim() || src;
    if (!groups[meetKey]) groups[meetKey] = [];
    groups[meetKey].push(item);
  });

  const elements = [];
  const cw_item = 1200;
  const cw_case = 2000;
  const cw_dec  = Math.floor((TABLE_W - cw_item - cw_case) / 2);
  const cw_track = TABLE_W - cw_item - cw_case - cw_dec;
  const cw = [cw_item, cw_case, cw_dec, cw_track];

  Object.entries(groups).forEach(([meetingName, items]) => {
    elements.push(new Table({
      width: { size: TABLE_W, type: "dxa" }, columnWidths: cw,
      rows: [
        // Meeting name spanning header
        new TableRow({ children: [
          new TableCell({
            columnSpan: 4, borders: thinBdr,
            shading: { fill: "BDD7EE", type: "clear" },
            margins: { top: 60, bottom: 60, left: 180, right: 180 },
            children: [new Paragraph({ spacing: sp(40,40), children: [run(
            meetingName.includes("會議") ? meetingName : meetingName + "　內部工作會議",
            12, true, "1F3864")] })]
          })
        ]}),
        // Column headers
        new TableRow({ children: [
          hdrCell("項次", cw[0]),
          hdrCell("案由", cw[1]),
          hdrCell("決議事項", cw[2]),
          hdrCell("追蹤辦理情形", cw[3]),
        ]}),
        // Data rows
        ...items.map(item => {
          const itemRef = (item.source||"").replace(/^.*?((?:臨時動議|討論事項|報告事項).*)$/, "$1") || item.source || "";
          const trackText = item.mode==="decision" ? "依決議辦理。" : (item.customText?.trim()||"（待填寫）");
          return new TableRow({ cantSplit: true, children: [
            cell(itemRef, cw[0], { size: 12 }),
            cell(item.caseTitle||"", cw[1], { size: 12 }),
            cell((item.content||""), cw[2], { size: 12 }),
            cell(trackText, cw[3], { size: 12, shade: "DEEAF1" }),
          ]});
        })
      ]
    }));
    elements.push(emptyP());
  });
  return elements;
}

// ── proposals: pure text, consistent format ───────────────────────
function buildProposals(items, isDiscussion) {
  const cnums = ["一","二","三","四","五","六","七","八","九","十"];
  const INDENT = 480;
  const result = [];
  items.forEach((p, i) => {
    // 第X案 (left) + 提案人 (right) via tab
    result.push(new Paragraph({
      spacing: sp(160, 60),
      tabStops: [{ type: "right", position: TABLE_W }],
      children: [
        run(`第${cnums[i]||i+1}案`, 12, true),
        new TextRun("\t"),
        run(`提案人：${p.proposer}`, 12),
      ]
    }));
    // 案由、說明、決議 - same indent, same style, no gap between them
    result.push(new Paragraph({
      spacing: sp(0, 0), indent: { left: INDENT },
      children: [ run("案　由：", 12), run(p.caseTitle||"", 12) ]
    }));
    result.push(new Paragraph({
      spacing: sp(0, 0), indent: { left: INDENT },
      children: [ run("說　明：", 12, true), run(p.description||"", 12) ]
    }));
    if (isDiscussion) {
      result.push(new Paragraph({
        spacing: sp(0, 0), indent: { left: INDENT },
        children: [ run("決　議：", 12, true), run(" ", 12) ]
      }));
    }
    result.push(emptyP());
  });
  return result;
}

// ── main docx builder ─────────────────────────────────────────────
function buildDocx(data) {
  const { info, prescStats, clinics, tracked, proposals, sectionData } = data;
  const sd = sectionData || {};
  const bySection = s => (proposals||[]).filter(p => p.include && p.section === s);

  const pdRows     = (sd.prescriptionDayCourses||[]).filter(r=>r._keep!==false);
  const uninstr    = (sd.uninstructed||[]).filter(r=>r._keep!==false);
  const venues     = (sd.venues||[]).filter(r=>r._keep!==false);
  const potCourses = (sd.potentialCourses||[]).filter(r=>r._keep!==false);
  const workReports= sd.workReports||[];
  const schedules  = sd.schedules||[];
  const visits     = sd.visits||[];
  const courses    = (sd.courses||[]).filter(c=>c._keep!==false);
  const rpt = bySection("報告事項");
  const dis = bySection("討論事項");
  const urg = bySection("臨時動議");

  // course table per type
  const TYPES = ["運動處方","社會處方","情緒調適處方","營養處方"];
  const courseElems = [];
  TYPES.forEach(type => {
    const tc = courses.filter(c=>c.type===type);
    if (!tc.length) return;
    courseElems.push(h3Para(type, 960));
    const lw = 2200, rest = TABLE_W - lw;
    const cw = [lw, 1100, 1000, 2300, rest-1100-1000-2300];
    courseElems.push(new Table({
      width: { size: TABLE_W, type: "dxa" }, columnWidths: cw,
      rows: [
        new TableRow({ children: [hdrCell("課程名稱",cw[0]),hdrCell("講師",cw[1]),hdrCell("時間",cw[2]),hdrCell("日期",cw[3]),hdrCell("授課地點",cw[4])] }),
        ...tc.map(c => new TableRow({ children: [
          cell(c.name||"",cw[0],{size:12}),
          cell(c.instructor||"",cw[1],{size:12}),
          cell(`週${c.weekday||""} ${c.time||""}`,cw[2],{size:12}),
          cell(c.dates||"",cw[3],{size:12}),
          cell(c.location||"",cw[4],{size:12}),
        ]}))
      ]
    }));
    courseElems.push(emptyP());
  });

  // simple table col widths (all must sum to TABLE_W)
  const pd_cw    = [1100, 900, 2400, 1500, TABLE_W-1100-900-2400-1500];
  const un_cw    = [1500, 1200, 1600, 1800, TABLE_W-1500-1200-1600-1800];
  const ve_cw    = [2000, 1200, 1500, 2500, TABLE_W-2000-1200-1500-2500];
  const pot_cw   = [2400, 1300, 1500, 1200, TABLE_W-2400-1300-1500-1200];

  const children = [
    // ── 標題 ──
    ctrPara(info.org, 14, true),
    ctrPara(info.subtitle, 12, false),
    ctrPara(`${info.meetingNo}內部工作會議${info.theme?`：${info.theme}`:""}　會議議程`, 14, true),
    emptyP(),
    para(`時間：${info.date}（星期${info.weekday}）${info.time}`, { size: 12 }),
    para(`地點：${info.location}`, { size: 12 }),
    para(`主席：${info.chair}`, { size: 12, after: 120 }),

    // ── 壹 ──
    h2Para("壹、主席致詞"),
    emptyP(),

    // ── 貳 ──
    h2Para("貳、計畫推動現況"),
    h3Para(`一、現行健康處方開立及執行情形${info.dataDate?`（截至 ${info.dataDate}）`:""}`),
    ...buildPrescTable(prescStats),
    emptyP(),

    h3Para(`二、目前診所拓點現況${info.dataDate?`（截至 ${info.dataDate}）`:""}`),
    ...buildClinicTable(clinics||[]),
    emptyP(),

    h3Para("三、目前課程開設現況"),
    ...(courseElems.length ? courseElems : [para("（尚未輸入課程資料）", { indent: 480 })]),

    h3Para("四、本月份健康處方課程表"),
    para("（詳見附件）", { indent: 960 }),

    h3Para("五、處方活動日課程表"),
    ...buildSimpleTable(pdRows, ["時間","區塊","課程名稱","講師","地點"], pd_cw),
    emptyP(),

    h3Para("六、曾參與說明會但未開課教師名單"),
    ...buildSimpleTable(uninstr, ["教師姓名","課程類型","職稱","推薦單位","預計開立課程"], un_cw),
    emptyP(),

    h3Para("七、潛在場地列表"),
    ...buildSimpleTable(venues, ["場地名稱","租金","空間大小","提供器材","備註"], ve_cw),
    emptyP(),

    h3Para("八、潛在課程及師資列表"),
    ...buildSimpleTable(potCourses, ["課程名稱","講師","類型","狀態","備註"], pot_cw),
    emptyP(),

    h3Para("九、未成功開課及可直接開課之課程列表"),
    ...buildSimpleTable(potCourses.filter(r=>r.status==="可直接開課"||r.status==="未成功"),
      ["課程名稱","講師","類型","狀態","備註"], pot_cw),

// File helpers
function parseDate(val) {
  if (!val) return null;
  const m = String(val).trim().match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  return m ? new Date(+m[1],+m[2]-1,+m[3]) : null;
}
async function parseExcel(file) {
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];res(XLSX.utils.sheet_to_json(ws,{header:1}));}catch(err){rej(err);}};
    r.onerror=rej; r.readAsArrayBuffer(file);
  });
}
function computeStats(rows, cutoffThis, cutoffLast) {
  const ORDER = ["運動處方","營養處方","社會處方","情緒調適處方"];
  const makeWin = s => { if(!s) return null; const e=new Date(s); e.setHours(23,59,59); const st=new Date(s); st.setDate(st.getDate()-6); st.setHours(0,0,0); return {start:st,end:e}; };
  const thisWin=makeWin(cutoffThis), lastWin=makeWin(cutoffLast);
  const mk=()=>{ const s={}; ORDER.forEach(k=>s[k]={open:0,exec:0}); return s; };
  const cumThis=mk(), cumLast=mk();
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; const pt=r[6]; const ex=r[14]; const d=parseDate(r[21]);
    if(!pt||cumThis[pt]===undefined) continue;
    const isEx=ex==="V"||ex==="v"||ex===true;
    if(!thisWin||d<=thisWin.end){cumThis[pt].open++;if(isEx)cumThis[pt].exec++;}
    if(lastWin&&d&&d<=lastWin.end){cumLast[pt].open++;if(isEx)cumLast[pt].exec++;}
  }
  const sum=(o,f)=>ORDER.reduce((s,k)=>s+o[k][f],0);
  const rate=(e,o)=>o?(e/o*100).toFixed(1)+"%":"0%";
  return {
    rows:ORDER.map(k=>({label:k,open:cumThis[k].open,exec:cumThis[k].exec,rate:rate(cumThis[k].exec,cumThis[k].open),
      prevOpen:lastWin?cumLast[k].open:0,prevExec:lastWin?cumLast[k].exec:0,prevRate:lastWin?rate(cumLast[k].exec,cumLast[k].open):"0%"})),
    total:{open:sum(cumThis,"open"),exec:sum(cumThis,"exec"),rate:rate(sum(cumThis,"exec"),sum(cumThis,"open")),
      prevOpen:lastWin?sum(cumLast,"open"):0,prevExec:lastWin?sum(cumLast,"exec"):0,prevRate:lastWin?rate(sum(cumLast,"exec"),sum(cumLast,"open")):"0%"}
  };
}

  };
  const removeItem = (i) => {
    let newManaged = managed, newSuggested = suggested;
    if (i < managed.length) { newManaged = managed.filter((_,j)=>j!==i); setManaged(newManaged); }
    else { newSuggested = suggested.filter((_,j)=>j!==(i-managed.length)); setSuggested(newSuggested); }
    triggerAutoSave([...newManaged, ...newSuggested]);
  };
  const addItem = () => {
    const newItem = { id:`m${Date.now()}`, source:"", caseTitle:"", content:"",
      include:true, mode:"decision", customText:"", needsManagement:true };
    const newSuggested = [...suggested, newItem];
    setSuggested(newSuggested);
    triggerAutoSave([...managed, ...newSuggested]);
  };
  const addNote = () => {
    const newItem = { id:`n${Date.now()}`, source:"", caseTitle:"", content:"",
      include:true, mode:"custom", customText:"", isNote:true, needsManagement:false };
    const newSuggested = [...suggested, newItem];
    setSuggested(newSuggested);
    triggerAutoSave([...managed, ...newSuggested]);
  };
  const clearAll = () => {
    if (!window.confirm("確定要清除所有列管事項？")) return;
    setManaged([]); setSuggested([]);
    saveTrackedItems([]).catch(()=>{});
  };
;

  const handleGenerate = async () => {
    const tracked = allItems.filter(i=>i.include!==false && !i.isNote);
    if (!tracked.length) { alert("沒有繼續列管的事項"); return; }
    try {
      if (!initDocx()) throw new Error("docx 程式庫未載入");
      const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
              WidthType, BorderStyle, ShadingType, VerticalAlign, AlignmentType } = window.docx;

      const KAI = "標楷體";
      const PT = n => n * 2;
      // 完全比照範例：line=240 exact
      const spExact = (before=0, after=0) => ({ line:240, lineRule:"exact", before, after });
      const bThin = { style: BorderStyle.SINGLE, size: 4, color: "auto" };
      const allBdr = b => ({ top:b, bottom:b, left:b, right:b });
      const tblBdr = allBdr(bThin);
      const GREEN = "C5E0B3";

      // 比照範例欄寬（總計 11550）
      const TW = 11550;
      const cw = [738, 1559, 5103, 4150];

      // 日期轉民國年
      const fmtDate = (iso) => {
        if (!iso) return "";
        const [y, m, d] = iso.split("-");
        return `${parseInt(y)-1911}年${parseInt(m)}月${parseInt(d)}日`;
      };

      // 段落：單一文字
      const mkP = (text, opts={}) => {
        const { bold=false, size=12, align=AlignmentType.LEFT, before=0, after=0 } = opts;
        return new Paragraph({
          alignment: align,
          spacing: spExact(before, after),
          children: [new TextRun({ text: String(text||""), font: KAI, size: PT(size), bold })]
        });
      };

      // 儲存格
      const mkCell = (children, w, opts={}) => {
        const { shade, span, valign=VerticalAlign.TOP } = opts;
        const paras = Array.isArray(children) ? children : [children];
        return new TableCell({
          width: { size: w, type: WidthType.DXA },
          borders: tblBdr,
          shading: shade ? { fill: shade, type: ShadingType.CLEAR } : undefined,
          verticalAlign: valign,
          columnSpan: span,
          margins: { top: 60, bottom: 60, left: 120, right: 120 },
          children: paras
        });
      };

      // 把文字按 (一)(二) 等拆成多段，並加 hanging indent 對齊文字起始
      const splitParas = (text, opts={}) => {
        if (!text) return [mkP("", opts)];
        const parts = text.replace(/([（(][一二三四五六七八九十百]+[）)])/g, "\n$1")
          .split("\n").map(s=>s.trim()).filter(Boolean);
        if (!parts.length) return [mkP(text, opts)];
        return parts.map((p, i) => {
          // 有 (一)(二) 前綴的段落：hanging indent 讓第二行縮排對齊文字
          const hasPrefix = /^[（(][一二三四五六七八九十百]+[）)]/.test(p);
          const hangingAmt = hasPrefix ? 420 : 0; // ~2 全形字寬
          const { bold=false, size=12, align=AlignmentType.LEFT } = opts;
          return new Paragraph({
            alignment: align,
            spacing: { line:240, lineRule:"exact", before: i>0?40:0, after:0 },
            indent: hangingAmt ? { left: hangingAmt, hanging: hangingAmt } : undefined,
            children: [new TextRun({ text: p, font: KAI, size: PT(size), bold })]
          });
        });
      };

      // Group by meeting
      const groups = {};
      tracked.forEach(item => {
        const src = item.source || "";
        const m = src.match(/健康台灣深耕計劃第([^次]*)次工作會議/);
        const meetKey = m ? `健康台灣深耕計劃第${m[1]}次工作會議` : (src || "其他");
        if (!groups[meetKey]) groups[meetKey] = [];
        groups[meetKey].push(item);
      });

      const rows = [];

      Object.entries(groups).forEach(([meetName, items]) => {
        // 會議標題列（span 4）：日期 + 會議名稱
        const titleDate = items.find(i=>i.meetingDate)?.meetingDate || "";
        const titleText = titleDate ? fmtDate(titleDate) + "　" + meetName : meetName;
        rows.push(new TableRow({ children: [
          mkCell(mkP(titleText, { bold:true, size:12 }), TW, { shade: GREEN, span: 4 })
        ]}));

        // 欄位標題列
        const anyDate = items.find(i=>i.meetingDate)?.meetingDate || "";
        const dateLabel = anyDate ? fmtDate(anyDate)+"會議追蹤辦理情形" : "本次會議追蹤辦理情形";
        rows.push(new TableRow({ children: [
          mkCell(mkP("項次",   { bold:true, size:12, align:AlignmentType.CENTER }), cw[0], { shade:GREEN }),
          mkCell(mkP("案由",   { bold:true, size:12 }), cw[1], { shade:GREEN }),
          mkCell(mkP("決議事項", { bold:true, size:12 }), cw[2], { shade:GREEN }),
          mkCell(mkP(dateLabel,  { bold:true, size:12 }), cw[3], { shade:GREEN }),
        ]}));

        // 資料列
        items.forEach(item => {
          const srcShort = (item.source||"")
            .replace(/健康台灣深耕計劃第[^次]*次工作會議\s*/, "").trim() || item.source || "";

          const handling = item.mode==="decision"
            ? "依決議辦理。"
            : (item.customText?.trim() || "（待填寫）");

          const isManaged = item.include !== false;
          const checkLine = isManaged ? "□解除列管☑繼續列管" : "☑解除列管□繼續列管";

          // 辦理情形：勾選 + 內容（(一)(二) 換行）
          const handlingParas = [
            mkP(checkLine, { size:12 }),
            ...splitParas(handling, { size:12 }),
          ];

          rows.push(new TableRow({ children: [
            mkCell(mkP(srcShort, { size:12 }), cw[0]),
            mkCell(splitParas(item.caseTitle||"", { size:12 }), cw[1]),
            mkCell(splitParas(item.content||"",  { size:12 }), cw[2]),
            mkCell(handlingParas, cw[3]),
          ]}));
        });
      });

      const doc = new Document({
        styles: { default: { document: { run: { font: KAI, size: PT(12) } } } },
        sections: [{
          properties: {
            page: {
              size: { width: 11906, height: 16838 },
              margin: { top: 720, right: 282, bottom: 567, left: 720 }
            }
          },
          children: [
            new Table({
              width: { size: TW, type: WidthType.DXA },
              indent: { size: -459, type: WidthType.DXA },
              columnWidths: cw,
              rows
            })
          ]
        }]
      });

      const blob = await Packer.toBlob(doc);
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "歷次決議辦理情形.docx"; a.click();
      URL.revokeObjectURL(url);
      setGenerated(true);
    } catch(e) { setErr("下載失敗："+e.message); console.error(e); }
  };

  const Dot = ({n}) => (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
      <div style={{ width:26, height:26, borderRadius:"50%", background:step>=n?C.ink:C.border,
        color:step>=n?"#e8dfc8":"#9a8660", display:"flex", alignItems:"center",
        justifyContent:"center", fontSize:11, fontWeight:700 }}>{n+1}</div>
      <span style={{ fontSize:10, color:step>=n?C.ink:"#9a8660", whiteSpace:"nowrap" }}>{STEPS[n]}</span>
    </div>
  );

  return (
    <div style={{ fontFamily:"'Noto Serif TC',STSong,serif", background:C.bg, minHeight:"100vh", color:C.ink }}>
      {/* Header */}
      <div style={{ background:C.ink, color:"#e8dfc8", padding:"22px 36px 16px", borderBottom:`3px solid ${C.gold}` }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize:19, fontWeight:700, letterSpacing:".12em" }}>工作會議摘要系統</div>
            <div style={{ fontSize:11, marginTop:3, opacity:.65 }}>健康台灣深耕計畫　內部工作會議</div>
          </div>
          <button style={{ ...S.btnO, fontSize:12, padding:"6px 14px", color:"#e8dfc8", borderColor:"rgba(255,255,255,0.3)" }}
            onClick={async()=>{
              if (view==="archive") { setView("main"); return; }
              setArchiveLoading(true);
              try { const idx = await loadArchiveIndex(); setArchives(Array.isArray(idx)?idx:[]); } catch { setArchives([]); }
              setArchiveLoading(false); setView("archive");
            }}>
            {view==="archive"?"← 返回製作":"📁 歷次存檔"}
          </button>
        </div>
      </div>

      <div style={{ maxWidth:960, margin:"0 auto", padding:"24px 18px" }}>

        {/* Archive view */}
        {view==="archive" && (
          <div>
            <div style={{ fontSize:16, fontWeight:700, marginBottom:16 }}>📁 歷次議程存檔</div>
            {archiveLoading && <div style={S.prog}>⏳ 載入中…</div>}
            {!archiveLoading && archives.length===0 && <div style={{ color:C.muted, textAlign:"center", padding:32 }}>尚未有任何存檔紀錄。</div>}
            {!archiveLoading && archives.map(a=>(
              <div key={a.id} style={{ ...S.card, padding:0, overflow:"hidden" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 18px" }}>
                  <div>
                    <div style={{ fontWeight:700, fontSize:14 }}>{a.title}</div>
                    <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>
                      會議日期：{a.date}　存檔：{new Date(a.createdAt).toLocaleString("zh-TW")}
                    </div>
                  </div>
                  <button style={S.btnS()} onClick={async()=>{
                    try {
                      const record = await loadArchiveRecord(a.id);
                      if (!record) return alert("找不到存檔資料");
                      const emptyInfo = {org:"台北市醫師公會「健康台灣深耕計畫」",subtitle:"臺北市慢性病防治全人健康智慧整合照護計畫",meetingNo:record.title||"",theme:"",date:record.date||"",weekday:"",time:"",location:"",chair:"",dataDate:""};
                      await generateAndDownloadDocx(
                        { info: emptyInfo, prescStats: null, clinics: [], tracked: record.tracked||[], proposals: [], sectionData: {} },
                        `${record.title}議程（存檔）.docx`
                      );
                    } catch(e) { alert("下載失敗："+e.message); }
                  }}>⬇ 下載</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Main workflow */}
        {view==="main" && (<>
          {/* Step dots */}
          <div style={{ display:"flex", alignItems:"center", marginBottom:24 }}>
            {STEPS.map((_,n)=>(
              <div key={n} style={{ display:"flex", alignItems:"center", flex: n<STEPS.length-1 ? 1 : "none" }}>
                <Dot n={n}/>
                {n<STEPS.length-1 && <div style={{ height:2, flex:1, background:step>n?C.ink:C.border, margin:"0 3px", marginBottom:14 }}/>}
              </div>
            ))}
          </div>

          {loading && <div style={S.prog}>⏳ {loading}</div>}
          {err && <div style={S.err}>⚠ {err}</div>}

          {/* Step 0: Tracked items */}
          {step===0 && (
            <div>
              <div style={S.card}>
                <div style={S.ch()}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span>列管事項確認</span>
                    <span style={{ fontSize:11, fontWeight:400, opacity:.75 }}>
                      {allItems.length > 0 ? (
                        `共 ${allItems.length} 筆　繼續 ${allItems.filter(i=>i.include!==false).length}　解除 ${allItems.filter(i=>i.include===false).length}　已有辦理情形 ${allItems.filter(i=>i.include!==false&&(i.mode==="decision"||i.customText?.trim())).length}`
                      ) : "尚未新增任何列管事項"}
                    </span>
                  </div>
                </div>
                <div style={S.cb}>
                  <div style={{ fontSize:13, color:C.muted, marginBottom:16, lineHeight:1.8 }}>
                    逐筆填入列管事項，選擇繼續或解除列管。繼續列管者可在「另外說明」輸入口語，按 <strong>✦ AI生成</strong> 後預覽正式公文內容再採用。
                  </div>

                  {allItems.map((item, i) => (
                    <TrackedItemRow
                      key={item.id||i}
                      item={item}
                      index={i}
                      isManaged={i < managed.length}
                      onUpdate={val=>updateItem(i,val)}
                      onRemove={()=>removeItem(i)}
                    />
                  ))}

                  <div style={{ display:"flex", gap:8, alignItems:"center", marginTop: allItems.length?8:0, flexWrap:"wrap" }}>
                    <button style={{ ...S.btnS(), fontSize:12 }} onClick={addItem}>＋ 新增列管事項</button>
                    <button style={{ ...S.btnS("#5d3a9a"), fontSize:12 }} onClick={addNote}>＋ 新增空白摘要筆記</button>
                    {allItems.length>0 && <button style={{ ...S.btnO, fontSize:11, padding:"4px 10px", color:"#c62828", borderColor:"#c62828" }} onClick={clearAll}>🗑 清除全部</button>}
                    {cloudSaved && <span style={{ fontSize:11, color:C.green }}>✓ 已自動儲存至雲端</span>}
                  </div>

                  {allItems.length===0 && (
                    <div style={{ color:C.muted, fontSize:13, padding:"10px 0 0" }}>
                      尚未有列管事項，請按上方按鈕新增。上次的資料會自動從雲端載入。
                    </div>
                  )}
                </div>
              </div>

              {generated && <div style={S.ok}>✓ 已下載「歷次決議辦理情形.docx」！</div>}

              {(()=>{
                const cont = allItems.filter(i=>i.include!==false);
                const incomplete = cont.filter(i=>i.mode==="custom"&&!i.customText?.trim());
                return (<>
                  {incomplete.length>0&&(
                    <div style={{padding:"8px 12px",background:"#fff8e1",border:`1px solid ${C.gold}`,
                      borderRadius:2,fontSize:12,color:"#795500",marginBottom:8}}>
                      ⚠ {incomplete.length} 筆選擇「另外說明」但尚未填寫辦理情形，下載後顯示「（待填寫）」
                    </div>
                  )}
                  {cont.length===0&&(
                    <div style={{padding:"8px 12px",background:"#fdecea",border:"1px solid #ef9a9a",
                      borderRadius:2,fontSize:12,color:"#c62828",marginBottom:8}}>
                      ⚠ 尚無繼續列管的事項，請先新增並設為「繼續列管」
                    </div>
                  )}
                </>);
              })()}

              <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                <button style={S.btn} onClick={handleGenerate}>⬇ 下載歷次決議辦理情形 .docx</button>
              </div>
            </div>
          )}
        </>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
