function parseDate(val) {
  if (!val) return null;
  const m = String(val).trim().match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  return m ? new Date(+m[1],+m[2]-1,+m[3]) : null;
}
async function parseExcel(file) {
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];res(XLSX.utils.sheet_to_json(ws,{header:1}));}catch(err){rej(err);}};
    r.onerror=rej; r.readAsArrayBuffer(file);
  });
}
function computeStats(rows, cutoffThis, cutoffLast) {
  const ORDER = ["運動處方","營養處方","社會處方","情緒調適處方"];
  const makeWin = s => { if(!s) return null; const e=new Date(s); e.setHours(23,59,59); const st=new Date(s); st.setDate(st.getDate()-6); st.setHours(0,0,0); return {start:st,end:e}; };
  const thisWin=makeWin(cutoffThis), lastWin=makeWin(cutoffLast);
  const mk=()=>{ const s={}; ORDER.forEach(k=>s[k]={open:0,exec:0}); return s; };
  const cumThis=mk(), cumLast=mk();
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; const pt=r[6]; const ex=r[14]; const d=parseDate(r[21]);
    if(!pt||cumThis[pt]===undefined) continue;
    const isEx=ex==="V"||ex==="v"||ex===true;
    if(!thisWin||d<=thisWin.end){cumThis[pt].open++;if(isEx)cumThis[pt].exec++;}
    if(lastWin&&d&&d<=lastWin.end){cumLast[pt].open++;if(isEx)cumLast[pt].exec++;}
  }
  const sum=(o,f)=>ORDER.reduce((s,k)=>s+o[k][f],0);
  const rate=(e,o)=>o?(e/o*100).toFixed(1)+"%":"0%";
  return {
    rows:ORDER.map(k=>({label:k,open:cumThis[k].open,exec:cumThis[k].exec,rate:rate(cumThis[k].exec,cumThis[k].open),
      prevOpen:lastWin?cumLast[k].open:0,prevExec:lastWin?cumLast[k].exec:0,prevRate:lastWin?rate(cumLast[k].exec,cumLast[k].open):"0%"})),
    total:{open:sum(cumThis,"open"),exec:sum(cumThis,"exec"),rate:rate(sum(cumThis,"exec"),sum(cumThis,"open")),
      prevOpen:lastWin?sum(cumLast,"open"):0,prevExec:lastWin?sum(cumLast,"exec"):0,prevRate:lastWin?rate(sum(cumLast,"exec"),sum(cumLast,"open")):"0%"}
  };
}
async function docxToText(file) {
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=async e=>{try{const result=await mammoth.extractRawText({arrayBuffer:e.target.result});res(result.value);}catch(err){rej(err);}};r.onerror=rej;r.readAsArrayBuffer(file);});
}
async function fileToBase64(file) {
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
}
function parseJSON(t,fb){try{return JSON.parse(t.replace(/```json\n?|```/g,"").trim());}catch{return fb;}}
async function extractMinutes(file) {
  const prompt=`請從這份會議紀錄中擷取資訊，以 JSON 格式回傳，不要有其他文字：
{
  "managedItems": [
    {"id":"m1","source":"來源（例：第十次臨時動議二）","caseTitle":"案由","content":"決議事項摘要","status":"目前辦理情形摘要","isManaged":true}
  ],
  "newItems": [
    {"id":"n1","source":"來源（例：報告事項一、討論事項第X案、臨時動議第X案）","caseTitle":"案由","content":"決議或重要內容摘要","needsManagement":true,"reason":"來源類型"}
  ]
}

擷取規則：
1. managedItems：找出「追蹤辦理情形」或「決議辦理情形」欄位中，有勾選「繼續列管」（☑繼續列管 或 ■繼續列管）的所有項目，isManaged 設為 true。
2. newItems：找出本次會議的「報告事項」「討論事項」「臨時動議」中的所有案件，全部列入，needsManagement 設為 true，reason 填入該項目屬於哪個類型（報告事項/討論事項/臨時動議）。
3. 兩個陣列都盡量完整，不要遺漏任何項目。`;
  if(file.name.toLowerCase().endsWith(".pdf")){
    const b64=await fileToBase64(file);
    const res=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:prompt}]}]})});
    const d=await res.json(); return parseJSON(d.content?.[0]?.text??"{}",{managedItems:[],newItems:[]});
  } else {
    const raw=await docxToText(file);
    const res=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`${prompt}\n\n會議紀錄：\n\n${raw}`}]})});
    const d=await res.json(); return parseJSON(d.content?.[0]?.text??"{}",{managedItems:[],newItems:[]});
  }
}
async function extractProposal(file) {
  const prompt=`請從這份提案單中擷取所有提案，以 JSON 陣列回傳：[{"id":"p1","proposer":"提案人","caseTitle":"案由","description":"說明","suggestedSection":"討論事項或報告事項或臨時動議"}]`;
  if(file.name.toLowerCase().endsWith(".pdf")){
    const b64=await fileToBase64(file);
    const res=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:prompt}]}]})});
    const d=await res.json(); return parseJSON(d.content?.[0]?.text??"[]",[]);
  } else {
    const raw=await docxToText(file);
    const res=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`${prompt}\n\n提案單：\n\n${raw}`}]})});
    const d=await res.json(); const r=parseJSON(d.content?.[0]?.text??"[]",[]); return Array.isArray(r)?r:[];
  }
}
async function polishText(raw) {
  const res=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"你是擅長撰寫公文的秘書。請將口語敘述整理成正式公文格式，語氣簡潔條理清晰，繁體中文。只輸出整理後文字。",messages:[{role:"user",content:raw}]})});
  const d=await res.json(); return d.content?.[0]?.text??raw;
}

function ImeInput({value, onChange, placeholder, type="text", style: sx}) {
  const id = React.useRef("ime_" + Math.random().toString(36).slice(2));
  React.useEffect(() => {
    const el = document.getElementById(id.current);
    if (el && el !== document.activeElement) el.value = value || "";
  });
  React.useEffect(() => {
    const el = document.getElementById(id.current);
    if (!el) return;
    let composing = false;
    const onCS = () => composing = true;
    const onCE = e => { composing = false; onChange(e.target.value); };
    const onInput = e => { if (!composing) onChange(e.target.value); };
    el.addEventListener("compositionstart", onCS);
    el.addEventListener("compositionend", onCE);
    el.addEventListener("input", onInput);
    return () => {
      el.removeEventListener("compositionstart", onCS);
      el.removeEventListener("compositionend", onCE);
      el.removeEventListener("input", onInput);
    };
  }, []);
  const styleStr = sx ? Object.entries(sx).map(([k,v])=>`${k.replace(/([A-Z])/g,'-$1').toLowerCase()}:${v}`).join(';') : '';
  return <input id={id.current} type={type} defaultValue={value||""} placeholder={placeholder||""} style={sx} />;
}
function ImeTarea({value, onChange, placeholder, rows=5, style: sx}) {
  const id = React.useRef("ime_" + Math.random().toString(36).slice(2));
  React.useEffect(() => {
    const el = document.getElementById(id.current);
    if (el && el !== document.activeElement) el.value = value || "";
  });
  React.useEffect(() => {
    const el = document.getElementById(id.current);
    if (!el) return;
    let composing = false;
    const onCS = () => composing = true;
    const onCE = e => { composing = false; onChange(e.target.value); };
    const onInput = e => { if (!composing) onChange(e.target.value); };
    el.addEventListener("compositionstart", onCS);
    el.addEventListener("compositionend", onCE);
    el.addEventListener("input", onInput);
    return () => {
      el.removeEventListener("compositionstart", onCS);
      el.removeEventListener("compositionend", onCE);
      el.removeEventListener("input", onInput);
    };
  }, []);
  return <textarea id={id.current} defaultValue={value||""} placeholder={placeholder||""} rows={rows} style={sx} />;
}
) {
  const ref = React.useRef(null);
  const composing = React.useRef(false);
  React.useEffect(() => {
    if (ref.current && ref.current !== document.activeElement) {
      ref.current.value = value || "";
    }
  }, [value]);
  return <textarea
    ref={ref}
    defaultValue={value||""}
    placeholder={placeholder}
    rows={rows}
    style={sx}
    onCompositionStart={() => { composing.current = true; }}
    onCompositionEnd={e => { composing.current = false; onChange(e.target.value); }}
    onInput={e => { if (!composing.current) onChange(e.target.value); }}
  />;
}
) {
  const [local, setLocal] = React.useState(value||"");
  const composing = React.useRef(false);
  const focused = React.useRef(false);
  React.useEffect(() => {
    if (!focused.current) setLocal(value||"");
  }, [value]);
  return <textarea
    value={local}
    placeholder={placeholder}
    rows={rows}
    style={sx}
    onFocus={() => focused.current = true}
    onBlur={e => { focused.current = false; onChange(e.target.value); }}
    onCompositionStart={() => composing.current = true}
    onCompositionEnd={e => { composing.current = false; setLocal(e.target.value); onChange(e.target.value); }}
    onChange={e => { setLocal(e.target.value); if (!composing.current) onChange(e.target.value); }}
  />;
}

}

async function parseCoursesToSchedule(rows) {
  // Build a text representation and ask Claude to format it
  const header = rows[0] || [];
  const dataRows = rows.slice(1).filter(r => r.some(c => c !== ""));
  const text = [header.join("\t"), ...dataRows.map(r => r.join("\t"))].join("\n");
  const res = await fetch(API, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514", max_tokens:1000,
      messages:[{role:"user", content:`以下是課程資料（TSV格式）：\n\n${text}\n\n請將這些課程資料整理成一個 JSON 陣列，每個元素代表一個課程：\n[{"name":"課程名稱","instructor":"講師","weekday":"星期幾（一二三四五六日）","time":"時間（例：14:00-15:30）","location":"地點","dates":"日期（例：3/4, 3/11, 3/18）","type":"運動處方或營養處方或社會處方或情緒調適處方","description":"課程說明"}]\n只回傳 JSON 陣列，不要其他文字。`}]
    })
  });
  const d = await res.json();
  try { return JSON.parse((d.content?.[0]?.text??"[]").replace(/```json\n?|```/g,"").trim()); }
  catch { return []; }
}

// ── PersistSection: reusable component for sections 5-9 and schedules ──
function PersistSection({ title, sectionKey, columns, defaultRow, renderRow, onDataChange }) {
  const [rows, setRows] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [lastSaved, setLastSaved] = useState(null);

  useEffect(() => {
    loadSectionData(sectionKey).then(data => {
      if (data && Array.isArray(data)) {
        setRows(data.map(r => ({ ...r, _keep: r._keep !== false })));
      } else {
        setRows([{ ...defaultRow, _keep: true, _id: Date.now() }]);
      }
      setLoaded(true);
    });
  }, [sectionKey]);

  useEffect(() => {
    if (loaded) onDataChange(rows.filter(r => r._keep));
  }, [rows, loaded]);

  const addRow = () => setRows(prev => [...prev, { ...defaultRow, _keep: true, _id: Date.now() + Math.random() }]);
  const updateRow = (i, field, val) => setRows(prev => { const n=[...prev]; n[i]={...n[i],[field]:val}; return n; });
  const removeRow = (i) => setRows(prev => prev.filter((_,j)=>j!==i));

  const handleSave = async () => {
    setSaving(true);
    await saveSectionData(sectionKey, rows);
    setLastSaved(new Date().toLocaleTimeString("zh-TW"));
    setSaving(false);
  };

  if (!loaded) return <div style={{color:"#888",fontSize:12,padding:8}}>載入中…</div>;

  return (
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:12,color:"#555"}}>
          {lastSaved && <span style={{color:"#2e7d32",fontSize:11}}>✓ 已儲存 {lastSaved}</span>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={{...S.btnS(),fontSize:11}} onClick={addRow}>＋ 新增列</button>
          <button style={{...S.btnS("#2e7d32"),fontSize:11}} onClick={handleSave} disabled={saving}>
            {saving?"儲存中…":"💾 儲存至雲端"}

        </div>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead>
            <tr>
              <th style={{background:"#2c2416",color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",width:40,textAlign:"center",fontSize:11}}>保留</th>
              {columns.map(c=><th key={c.key} style={{background:"#2c2416",color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",fontSize:11,whiteSpace:"nowrap"}}>{c.label}</th>)}
              <th style={{background:"#2c2416",color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",width:40,fontSize:11}}>刪除</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((row,i)=>(
              <tr key={row._id||i} style={{background:row._keep?"white":"#f5f5f5",opacity:row._keep?1:0.5}}>
                <td style={{textAlign:"center",border:"1px solid #ddd",padding:"4px"}}>
                  <input type="checkbox" checked={!!row._keep} onChange={e=>updateRow(i,"_keep",e.target.checked)}/>
                </td>
                {columns.map(c=>(
                  <td key={c.key} style={{border:"1px solid #ddd",padding:"2px 4px"}}>
                    {c.type==="select"
                      ? <select value={row[c.key]||""} onChange={e=>updateRow(i,c.key,e.target.value)}
                          style={{width:"100%",border:"none",fontSize:11,background:"transparent",fontFamily:"inherit"}}>
                          {c.options.map(o=><option key={o} value={o}>{o}</option>)}
                        </select>
                      : <input value={row[c.key]||""} onChange={e=>updateRow(i,c.key,e.target.value)}

                          placeholder={c.placeholder||""}/>
                    }
                  </td>
                ))}
                <td style={{textAlign:"center",border:"1px solid #ddd",padding:"4px"}}>
                  <button onClick={()=>removeRow(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#aaa",fontSize:14}}>✕</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function CourseScheduleSection({ onDataChange }) {
  const [courses, setCourses] = useState([]);
  const [loading, setLoading] = useState("");
  const [loaded, setLoaded] = useState(false);
  const fileRef = useRef();

  useEffect(() => {
    loadSectionData("courses").then(data => {
      if (data && Array.isArray(data)) setCourses(data);
      setLoaded(true);
    });

  useEffect(() => { if(loaded) onDataChange(courses); }, [courses, loaded]);

  const handleExcel = async (file) => {
    if (!file) return;

      const rows = await parseCourseExcel(file);

  const diff=(cur,prev)=>{if(prev===undefined||prev===null||prev==="")return"";const c=typeof cur==="string"?parseFloat(cur):cur,p=typeof prev==="string"?parseFloat(prev):prev;if(isNaN(c)||isNaN(p))return"";const d=c-p;return d===0?"0":d>0?`+${typeof cur==="string"&&cur.includes("%")?d.toFixed(1)+"%":d}`:`${typeof cur==="string"&&cur.includes("%")?d.toFixed(1)+"%":d}`;};

  const rpt=bySection("報告事項"),dis=bySection("討論事項"),urg=bySection("臨時動議");

  return `<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8">
<style>

.i1 { text-indent: 2em; }
.i2 { text-indent: 4em; }
hr { border: none; border-top: 1.5pt solid #000; margin: 8pt 0; }
.track { border: 1pt solid #aaa; padding: 4pt 8pt; margin: 4pt 2em; }
.track p { line-height: 1.8; font-size: 11pt; }
.proposal { margin: 6pt 0 6pt 2em; }
.proposal p { line-height: 1.8; }
.dt1 { width: 100%; border: none; border-collapse: collapse; }
.dt1 td { border: none; vertical-align: top; padding: 0 4pt; font-size: 11pt; line-height: 1.8; }
.dl { white-space: nowrap; font-weight: bold; width: 5em; }
.dt2 { width: 100%; border-collapse: collapse; font-size: 10pt; margin: 4pt 2em 6pt; width: calc(100% - 2em); }
.dt2 td, .dt2 th { border: 0.5pt solid #888; padding: 2pt 5pt; vertical-align: middle; line-height: 1.6; }
.hdr th { background: #2c2416; color: #fff; text-align: center; font-weight: bold; }
.tot { background: #f5f0e8; font-weight: bold; }
.grp { text-align: center; font-weight: bold; background: #f5f0e8; }
.c { text-align: center; }
.b { font-weight: bold; }
.sm { font-size: 9pt; }
</style></head><body>
<h1>${info.org}</h1>
<h1>${info.subtitle}</h1>
<h1>${info.meetingNo}內部工作會議${info.theme?`：${info.theme}`:""}　會議議程</h1>

${prescHTML}

${clinicHTML}

${courseHTML}

${pdHTML}

${uninstrHTML}

${venueHTML}

${potHTML}
<h3>九、未成功開課及可直接開課之課程列表</h3>
${potHTML}

${rpt.length>0?propBlock(rpt,false):""}

${schedHTML}

${urg.length===0?"<p class='i1'>（無）</p>":propBlock(urg,true)}

  const [minutesName,setMinutesName]=useState("");
  const [excelName,setExcelName]=useState("");
  const [generated,setGenerated]=useState(false);
  const [archives,setArchives]=useState([]);
  const [archiveLoading,setArchiveLoading]=useState(false);
  const [info,setInfo]=useState({org:"台北市醫師公會「健康台灣深耕計畫」",subtitle:"臺北市慢性病防治全人健康智慧整合照護計畫",meetingNo:"第十八次",theme:"統整近期工作進度與後續執行方向",date:"",weekday:"",time:"14：00",location:"",chair:"健康台灣深耕計畫 蔡蕙芳執行長",dataDate:""});
  const [prescStats,setPrescStats]=useState(null);
  const [excelRows,setExcelRows]=useState(null);
  const [cutoffThis,setCutoffThis]=useState("");
  const [cutoffLast,setCutoffLast]=useState("");
  const [clinics,setClinics]=useState(DEFAULT_CLINICS);
  const [sectionData,setSectionData]=useState({});
  const [workReports,setWorkReports]=useState([]);

  useEffect(()=>{
    loadWorkReports().then(r=>{ setSectionData(prev=>({...prev,workReports:r})); setWorkReports(r); });
  },[]);
  const updateSection=(key,data)=>setSectionData(prev=>({...prev,[key]:data}));
  const [managed,setManaged]=useState([]);
  const [suggested,setSuggested]=useState([]);
  const [proposals,setProposals]=useState([]);
  const minutesRef=useRef(), excelRef=useRef(), proposalRef=useRef();

  const updateManaged=(i,v)=>setManaged(a=>{const n=[...a];n[i]=v;return n;});
  const updateSuggested=(i,v)=>setSuggested(a=>{const n=[...a];n[i]=v;return n;});
  const updateProposal=(i,v)=>setProposals(a=>{const n=[...a];n[i]=v;return n;});
  const removeProposal=(i)=>setProposals(a=>a.filter((_,j)=>j!==i));
  const updateClinic=(id,field,value)=>setClinics(a=>a.map(c=>c.id===id?{...c,[field]:value}:c));

  const recalcStats=useCallback((rows,cThis,cLast)=>{
    const stats=computeStats(rows,cThis||null,cLast||null);
    const clinicMap={};
    const cutoffDate=cThis?new Date(cThis):null;
    for(let i=1;i<rows.length;i++){const r=rows[i];const cn=r[7];const ex=r[14];const od=parseDate(r[21]);if(!cn)continue;if(cutoffDate&&od&&od>cutoffDate)continue;if(!clinicMap[cn])clinicMap[cn]={open:0,exec:0};clinicMap[cn].open++;if(ex==="V"||ex==="v"||ex===true)clinicMap[cn].exec++;}
    setClinics(prev=>prev.map(c=>{const key=Object.keys(clinicMap).find(k=>k.includes(c.name.slice(0,4))||c.name.includes(k.slice(0,4)));if(key)return{...c,openCount:clinicMap[key].open,execCount:clinicMap[key].exec};return c;}));
    setPrescStats(stats);
  },[]);

  useEffect(()=>{ if(excelRows) recalcStats(excelRows,cutoffThis,cutoffLast); },[cutoffThis,cutoffLast]);

  const handleMinutes=async(file)=>{
    if(!file)return;setErr("");setLoading("解析會議紀錄…");
    try{const data=await extractMinutes(file);setManaged((data?.managedItems||[]).filter(i=>i.isManaged).map(i=>({...i,include:true,mode:"decision",customText:""})));setSuggested((data?.newItems||[]).filter(i=>i.needsManagement).map(i=>({...i,include:true,mode:"decision",customText:""})));setMinutesName(file.name);setStep(1);}
    catch(e){setErr("解析失敗："+e.message);}setLoading("");
  };
  const handleExcel=async(file)=>{
    if(!file)return;setErr("");setLoading("讀取 Excel 資料…");
    try{const rows=await parseExcel(file);setExcelRows(rows);setExcelName(file.name);let maxDate=null;for(let i=1;i<rows.length;i++){const d=parseDate(rows[i][21]);if(d&&(!maxDate||d>maxDate))maxDate=d;}let isoThis="",isoLast="";if(maxDate){isoThis=`${maxDate.getFullYear()}-${String(maxDate.getMonth()+1).padStart(2,"0")}-${String(maxDate.getDate()).padStart(2,"0")}`;const prev=new Date(maxDate);prev.setDate(prev.getDate()-7);isoLast=`${prev.getFullYear()}-${String(prev.getMonth()+1).padStart(2,"0")}-${String(prev.getDate()).padStart(2,"0")}`;setCutoffThis(isoThis);setCutoffLast(isoLast);}recalcStats(rows,isoThis||null,isoLast||null);}
    catch(e){setErr("Excel 解析失敗："+e.message);}setLoading("");
  };
  const handleProposal=async(file)=>{
    if(!file)return;setErr("");setLoading(`解析提案單「${file.name}」…`);
    try{const items=await extractProposal(file);const annotated=items.map(i=>({...i,section:i.suggestedSection||"討論事項",include:true,id:i.id||`p${Date.now()}${Math.random().toString(36).slice(2)}`}));setProposals(prev=>[...prev,...annotated]);}
    catch(e){setErr("提案單解析失敗："+e.message);}setLoading("");
  };

  const handleGenerate=async()=>{
    const tracked=[...managed.filter(i=>i.include),...suggested.filter(i=>i.include)];
    const html=buildWordHTML(info,prescStats,clinics,tracked,proposals,sectionData);
    const blob=new Blob(["\ufeff"+html],{type:"application/msword;charset=utf-8"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`${info.meetingNo}內部工作會議議程.doc`;a.click();URL.revokeObjectURL(url);
    try{const record={id:`agenda_${Date.now()}`,title:`${info.meetingNo}內部工作會議`,date:info.date,createdAt:new Date().toISOString(),info,tracked,proposals:proposals.filter(p=>p.include),hasPrescStats:!!prescStats};await saveArchive(record);}catch(e){console.warn("存檔失敗",e);}
    setGenerated(true);
  };

  const Dot=({n})=><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
    <div style={{width:26,height:26,borderRadius:"50%",background:step>=n?C.ink:C.border,color:step>=n?"#e8dfc8":"#9a8660",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>{n+1}</div>
    <span style={{fontSize:10,color:step>=n?C.ink:"#9a8660",whiteSpace:"nowrap"}}>{STEPS[n]}</span>
  </div>;

  return (
    <div style={{fontFamily:"'Noto Serif TC',STSong,serif",background:C.bg,minHeight:"100vh",color:C.ink}}>
      <div style={{background:C.ink,color:"#e8dfc8",padding:"22px 36px 16px",borderBottom:`3px solid ${C.gold}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div style={{fontSize:19,fontWeight:700,letterSpacing:".12em"}}>會議議程製作系統</div><div style={{fontSize:11,marginTop:3,opacity:.65}}>健康台灣深耕計畫　內部工作會議</div></div>
          <button style={{...S.btnO,fontSize:12,padding:"6px 14px",color:"#e8dfc8",borderColor:"rgba(255,255,255,0.3)"}}
            onClick={async()=>{if(view==="archive"){setView("main");return;}setArchiveLoading(true);try{const idx=await loadArchiveIndex();setArchives(Array.isArray(idx)?idx:[]);}catch{setArchives([]);}setArchiveLoading(false);setView("archive");}}>
            {view==="archive"?"← 返回製作":"📁 歷次存檔"}
          </button>
        </div>
      </div>

      <div style={{maxWidth:960,margin:"0 auto",padding:"24px 18px"}}>
        {view==="archive" && (
          <div>
            <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>📁 歷次議程存檔</div>
            {archiveLoading&&<div style={S.prog}>⏳ 載入中…</div>}
            {!archiveLoading&&archives.length===0&&<div style={{color:C.muted,textAlign:"center",padding:32,fontSize:14}}>尚未有任何存檔紀錄。</div>}
            {!archiveLoading&&archives.map(a=>(
              <div key={a.id} style={{...S.card,padding:0,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 18px"}}>
                  <div><div style={{fontWeight:700,fontSize:14}}>{a.title}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>會議日期：{a.date}　存檔：{new Date(a.createdAt).toLocaleString("zh-TW")}</div></div>
                  <button style={S.btnS()} onClick={async()=>{try{const record=await loadArchiveRecord(a.id);if(!record)return alert("找不到存檔資料");const html=buildWordHTML(record.info,null,DEFAULT_CLINICS,record.tracked||[],record.proposals||[]);const blob=new Blob(["\ufeff"+html],{type:"application/msword;charset=utf-8"});const url=URL.createObjectURL(blob);const el=document.createElement("a");el.href=url;el.download=`${record.title}議程（存檔）.doc`;el.click();URL.revokeObjectURL(url);}catch(e){alert("下載失敗："+e.message);}}}>⬇ 下載</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {view==="main" && (<>
          <div style={{display:"flex",alignItems:"center",marginBottom:24}}>

              <div key={n} style={{display:"flex",alignItems:"center",flex:n<STEPS.length-1?1:"none"}}>
                <Dot n={n}/>
                {n<STEPS.length-1&&<div style={{height:2,flex:1,background:step>n?C.ink:C.border,margin:"0 3px",marginBottom:14}}/>}

          {loading&&<div style={S.prog}>⏳ {loading}</div>}

          {/* S0 */}
          {step===0&&<div style={S.card}><div style={S.ch()}>步驟一　上傳前次會議紀錄</div><div style={S.cb}><UploadZone onFile={handleMinutes} fileRef={minutesRef} label="拖曳或點擊上傳會議紀錄" sub="支援 PDF、Word (.docx)"/>{minutesName&&<div style={{fontSize:12,color:C.muted,marginTop:8}}>✓ 已載入：{minutesName}</div>}</div></div>}

          {/* S1 */}
          {step===1&&<div style={S.card}><div style={S.ch()}>步驟二　設定本次會議基本資訊</div><AgendaForm info={info} onChange={setInfo}/><div style={{padding:"0 18px 18px",display:"flex",gap:10}}><button style={S.btnO} onClick={()=>setStep(0)}>← 上一步</button><button style={S.btn} onClick={()=>setStep(2)}>下一步 →</button></div></div>}

          {/* S2 */}
          {step===2&&<>
            <div style={S.card}><div style={S.ch("#2e5d2e")}>步驟三　計畫推動現況</div><div style={S.cb}>
              {/* 處方統計 */}
              <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>① 現行健康處方開立及執行情形</div>
              <UploadZone onFile={handleExcel} fileRef={excelRef} label="上傳處方紀錄 Excel" sub="上傳後自動計算各類處方統計" accept=".xlsx,.xls"/>
              {excelName&&<div style={{fontSize:12,color:C.muted,marginTop:6}}>✓ 已載入：{excelName}</div>}
              {excelRows&&<div style={{marginTop:14}}>
                <div style={{...S.row,gap:20,marginBottom:12,flexWrap:"wrap"}}>
                  <div><div style={S.lbl}>本週截止日</div><input type="date" style={{...S.inp,maxWidth:180}} value={cutoffThis} onChange={e=>setCutoffThis(e.target.value)}/></div>
                  <div><div style={S.lbl}>上週截止日</div><input type="date" style={{...S.inp,maxWidth:180}} value={cutoffLast} onChange={e=>setCutoffLast(e.target.value)}/></div>
                </div>
                {prescStats&&<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr><th rowSpan={2} style={{background:C.ink,color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",width:"20%"}}>處方類別</th><th colSpan={3} style={{background:C.ink,color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",textAlign:"center"}}>處方數</th><th colSpan={3} style={{background:C.ink,color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",textAlign:"center"}}>已執行</th><th colSpan={3} style={{background:C.ink,color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",textAlign:"center"}}>執行率</th></tr>
                    <tr>{["本週","上週","差異","本週","上週","差異","本週","上週","差異"].map((h,i)=><th key={i} style={{background:C.ink,color:"#e8dfc8",padding:"4px 6px",border:"1px solid #555",fontSize:10,textAlign:"center"}}>{h}</th>)}</tr>
                  </thead>
                  <tbody>
                    {[...prescStats.rows,{label:"處方開立總數(各處方加總)",isTotal:true,...prescStats.total}].map((r,i)=>{
                      const dO=r.open-(r.prevOpen||0),dE=r.exec-(r.prevExec||0),dR=parseFloat(r.rate)-(parseFloat(r.prevRate||"0"));
                      const fmt=(d,isR)=>d===0?"0":d>0?`+${isR?d.toFixed(1)+"%":d}`:`${isR?d.toFixed(1)+"%":d}`;
                      const dc=(v)=>typeof v==="string"&&v.startsWith("+")?"#2e7d32":v==="0"||v==="0%"?"#555":"#c62828";
                      return <tr key={i} style={{background:r.isTotal?"#f5f0e8":"white",fontWeight:r.isTotal?700:400}}>
                        <td style={{padding:"3px 8px",border:`1px solid ${C.border}`,fontSize:11}}>{r.label}</td>
                        {[r.open,r.prevOpen||0,fmt(dO,false),r.exec,r.prevExec||0,fmt(dE,false),r.rate,r.prevRate||"0%",fmt(dR,true)].map((v,j)=>(

                      </tr>;

                  </tbody>
                </table></div>}
              </div>}
            </div></div>

            {/* 診所拓點 */}
            <div style={S.card}><div style={S.ch("#2e5d2e")}>② 診所拓點現況（數字從 Excel 自動更新）</div><div style={S.cb}><div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:700}}>
                <thead>
                  <tr><th rowSpan={2} style={{background:C.ink,color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",width:"6%"}}>分類</th><th rowSpan={2} style={{background:C.ink,color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555"}}>診所名稱</th><th rowSpan={2} style={{background:C.ink,color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",fontSize:10}}>預計教學時間</th><th colSpan={4} style={{background:C.ink,color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",fontSize:10,textAlign:"center"}}>設置情形</th><th colSpan={2} style={{background:C.ink,color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",textAlign:"center"}}>處方數量</th><th rowSpan={2} style={{background:C.ink,color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555"}}>備註</th></tr>

                </thead>
                <tbody>
                  {["自有營養師","已媒合","有空間待媒合","無空間"].map(grp=>{const items=clinics.filter(c=>c.group===grp);if(!items.length)return null;return items.map((c,i)=>(
                    <tr key={c.id}>
                      {i===0&&<td rowSpan={items.length} style={{textAlign:"center",verticalAlign:"middle",background:"#f5f0e8",fontSize:11,fontWeight:700,border:`1px solid ${C.border}`,padding:"4px 6px"}}>{grp}</td>}
                      <td style={{padding:"3px 8px",border:`1px solid ${C.border}`,fontSize:12}}>{c.name}</td>
                      <td style={{padding:"3px 6px",textAlign:"center",border:`1px solid ${C.border}`,fontSize:11}}>{c.teachTime}</td>
                      {["eSig","nutrition","coupon","consultation"].map(f=><td key={f} style={{textAlign:"center",border:`1px solid ${C.border}`,padding:"3px 6px"}}><input type="checkbox" checked={!!c[f]} onChange={e=>updateClinic(c.id,f,e.target.checked)}/></td>)}
                      <td style={{textAlign:"center",fontWeight:700,color:C.blue,border:`1px solid ${C.border}`,padding:"3px 6px"}}>{c.openCount}</td>
                      <td style={{textAlign:"center",fontWeight:700,color:C.green,border:`1px solid ${C.border}`,padding:"3px 6px"}}>{c.execCount}</td>
                      <td style={{border:`1px solid ${C.border}`,padding:"3px 6px",fontSize:11}}><input style={{width:"100%",border:"1px solid #ddd",padding:"2px 4px",fontSize:11}} value={c.note} onChange={e=>updateClinic(c.id,"note",e.target.value)}/></td>
                    </tr>
                  ));})}
                </tbody>
              </table>
            </div></div></div>

            {/* 課程開設現況 */}
            <div style={S.card}><div style={S.ch("#2e5d2e")}>③ 目前課程開設現況</div><div style={S.cb}>
              <CourseScheduleSection onDataChange={data=>updateSection("courses",data)}/>
            </div></div>

            {/* 五至九 */}
            <div style={S.card}><div style={S.ch("#2e5d2e")}>④ 處方活動日課程表（可延續上次資料）</div><div style={S.cb}>
              <PersistSection title="處方活動日課程表" sectionKey="prescriptionDayCourses" columns={PRESCRIPTION_DAY_COLS} defaultRow={PRESCRIPTION_DAY_DEFAULT} onDataChange={data=>updateSection("prescriptionDayCourses",data)}/>
            </div></div>

            <div style={S.card}><div style={S.ch("#2e5d2e")}>⑤ 曾參與說明會但未開課教師名單（可延續上次資料）</div><div style={S.cb}>
              <PersistSection title="未開課師資" sectionKey="uninstructed" columns={UNINSTRUCTED_COLS} defaultRow={UNINSTRUCTED_DEFAULT} onDataChange={data=>updateSection("uninstructed",data)}/>
            </div></div>

            <div style={S.card}><div style={S.ch("#2e5d2e")}>⑥ 潛在場地列表（可延續上次資料）</div><div style={S.cb}>
              <PersistSection title="潛在場地" sectionKey="venues" columns={VENUE_COLS} defaultRow={VENUE_DEFAULT} onDataChange={data=>updateSection("venues",data)}/>
            </div></div>

            <div style={S.card}><div style={S.ch("#2e5d2e")}>⑦⑧ 潛在課程及師資／未成功開課課程（可延續上次資料）</div><div style={S.cb}>
              <PersistSection title="潛在課程" sectionKey="potentialCourses" columns={POTENTIAL_COURSE_COLS} defaultRow={POTENTIAL_COURSE_DEFAULT} onDataChange={data=>updateSection("potentialCourses",data)}/>
            </div></div>

            {/* 時程表 */}
            <div style={S.card}><div style={S.ch("#2e5d2e")}>⑨ 重要會議及活動時程（可延續上次資料）</div><div style={S.cb}>
              <PersistSection title="重要時程" sectionKey="schedules" columns={SCHEDULE_COLS} defaultRow={SCHEDULE_DEFAULT} onDataChange={data=>updateSection("schedules",data)}/>
            </div></div>

            <div style={S.card}><div style={S.ch("#2e5d2e")}>⑩ 拜會處方執行相關單位時程（可延續上次資料）</div><div style={S.cb}>
              <PersistSection title="拜會時程" sectionKey="visits" columns={VISIT_COLS} defaultRow={VISIT_DEFAULT} onDataChange={data=>updateSection("visits",data)}/>
            </div></div>

            <div style={{display:"flex",gap:10}}><button style={S.btnO} onClick={()=>setStep(1)}>← 上一步</button><button style={S.btn} onClick={()=>setStep(3)}>下一步 →</button></div>
          </>}

                    {/* S3 */}
          {step===3&&<>
            {managed.length>0&&<div style={S.card}><div style={S.ch()}>📌 繼續列管事項</div><div style={S.cb}>{managed.map((item,i)=><TrackedCard key={item.id||i} item={item} index={i} onChange={updateManaged}/>)}</div></div>}
            {suggested.length>0&&<div style={S.card}><div style={S.ch("#2e5d9a")}>🔔 建議列管事項（AI 判斷）</div><div style={S.cb}>{suggested.map((item,i)=><TrackedCard key={item.id||i} item={item} index={i} onChange={updateSuggested}/>)}</div></div>}
            {managed.length===0&&suggested.length===0&&<div style={S.card}><div style={S.cb}><div style={{color:C.muted,textAlign:"center",padding:14}}>未解析到需列管事項，可直接繼續。</div></div></div>}
            <div style={{display:"flex",gap:10}}><button style={S.btnO} onClick={()=>setStep(2)}>← 上一步</button><button style={S.btn} onClick={()=>setStep(4)}>下一步：加入提案 →</button></div>
          </>}

          {/* S4 */}
          {step===4&&<>
            <div style={S.card}><div style={S.ch("#4a1a7a")}>📋 步驟五　提案整合</div><div style={S.cb}>
              <div style={{background:"#f0eaf8",border:"1px solid #b39ddb",borderRadius:2,padding:"14px 16px",marginBottom:16}}>
                <div style={{fontWeight:700,fontSize:13,color:"#4a1a7a",marginBottom:6}}>🔗 從提案收集平台載入</div>
                <div style={{fontSize:12,color:C.muted,marginBottom:10}}>自動載入平台上狀態為「已納入」的提案</div>
                <button style={S.btnS("#5d3a9a")} onClick={async()=>{
                  try{const approved=await loadApprovedProposals();if(!approved.length){alert("平台上目前沒有標記為「已納入」的提案");return;}
                  const annotated=approved.map(p=>({id:p.id,proposer:p.proposer,caseTitle:p.caseTitle,description:p.description,section:p.section||"討論事項",include:true}));
                  const existingIds=new Set(proposals.map(x=>x.id));const newOnes=annotated.filter(x=>!existingIds.has(x.id));
                  setProposals(prev=>[...prev,...newOnes]);alert(`已載入 ${newOnes.length} 筆提案`);}catch(e){alert("載入失敗："+e.message);}
                }}>↓ 從平台載入已核可提案</button>
              </div>
              <div style={{...S.lbl,marginBottom:8}}>或手動上傳提案單</div>
              <UploadZone onFile={handleProposal} fileRef={proposalRef} label="拖曳或點擊上傳提案單" sub="支援 PDF、Word (.docx)，可重複上傳多份"/>
              <div style={{fontSize:12,color:C.muted,marginTop:8}}>✦ AI 解析後建議分類，可手動調整</div>
            </div></div>
            {proposals.length>0&&<div style={S.card}><div style={S.ch("#4a1a7a")}>已整合提案（{proposals.length} 項）</div><div style={S.cb}>{proposals.map((p,i)=><ProposalCard key={p.id||i} prop={p} index={i} onChange={updateProposal} onRemove={()=>removeProposal(i)}/>)}</div></div>}
            <div style={{display:"flex",gap:10}}><button style={S.btnO} onClick={()=>setStep(3)}>← 上一步</button><button style={S.btn} onClick={()=>setStep(5)}>{proposals.length===0?"略過，直接產生議程 →":"下一步：產生議程 →"}</button></div>
          </>}

          {/* S5 */}
          {step===5&&<div style={S.card}><div style={S.ch()}>步驟六　預覽議程並下載</div><div style={S.cb}>
            <div style={{border:`2px solid ${C.border}`,borderRadius:2,overflow:"hidden",marginBottom:18}}>
              <div style={{background:C.border,padding:"7px 14px",fontSize:12,color:C.muted,display:"flex",justifyContent:"space-between"}}>
                <span>📄 議程預覽</span><span style={{fontSize:11}}>以下為實際輸出內容</span>
              </div>
              <div style={{padding:"24px 32px",background:"#fff",fontFamily:"'Noto Serif TC',STSong,serif",fontSize:13,lineHeight:2.1}}>
                <div style={{textAlign:"center",fontWeight:700,fontSize:14}}>{info.org}</div>
                <div style={{textAlign:"center",fontSize:12}}>{info.subtitle}</div>
                <div style={{textAlign:"center",fontWeight:700,fontSize:14,marginBottom:4}}>{info.meetingNo}內部工作會議{info.theme?`：${info.theme}`:""}　會議議程</div>
                <div style={{textAlign:"center",fontSize:12,color:C.muted}}>時間：{info.date}（星期{info.weekday}）{info.time}</div>
                <div style={{textAlign:"center",fontSize:12,color:C.muted,marginBottom:8}}>地點：{info.location}　主席：{info.chair}</div>
                <hr style={{borderTop:`1.5px solid ${C.ink}`,margin:"8px 0 12px"}}/>
                <div style={{fontWeight:700,marginBottom:4}}>壹、主席致詞</div>
                <div style={{fontWeight:700,marginBottom:4}}>貳、計畫推動現況</div>
                {["一、現行健康處方開立及執行情形","二、目前診所拓點現況","三、目前課程開設現況","四、本月份健康處方課程表","五、處方活動日課程表","六、曾參與說明會但未開課教師名單","七、潛在場地列表","八、潛在課程及師資列表","九、未成功開課及可直接開課之課程列表"].map(s=><div key={s} style={{paddingLeft:"2em",fontSize:12}}>{s}</div>)}
                <div style={{fontWeight:700,marginBottom:4,marginTop:8}}>參、確認歷次健康台灣深耕計畫會議紀錄暨決議辦理情形</div>
                {[...managed.filter(i=>i.include),...suggested.filter(i=>i.include)].length===0
                  ?<div style={{paddingLeft:"2em",fontSize:12,color:C.muted}}>（本次無列管追蹤事項）</div>
                  :[...managed.filter(i=>i.include),...suggested.filter(i=>i.include)].map((item,j)=>(
                  <div key={j} style={{margin:"6px 2em",padding:"8px 12px",border:`1px solid ${C.border}`,borderRadius:1,fontSize:12}}>
                    <div><strong>【{item.source}】</strong>案由：{item.caseTitle}</div>
                    <div><strong>本次辦理情形：</strong>{item.mode==="decision"?"依決議辦理。":(item.customText||"（待填寫）")}</div>
                  </div>
                ))}
                {[["肆、報告事項","報告事項"],["伍、討論事項","討論事項"],["陸、臨時動議","臨時動議"]].map(([label,sec])=>(
                  <div key={sec}>
                    <div style={{fontWeight:700,marginBottom:4,marginTop:8}}>{label}</div>
                    {proposals.filter(p=>p.include&&p.section===sec).length===0&&sec!=="肆、報告事項"&&<div style={{paddingLeft:"2em",fontSize:12,color:C.muted}}>（無）</div>}
                    {proposals.filter(p=>p.include&&p.section===sec).map((p,j)=>(
                      <div key={j} style={{margin:"4px 2em",padding:"6px 12px",border:`1px solid ${C.border}`,borderRadius:1,fontSize:12,borderLeft:`3px solid ${SC[sec]||C.gold}`}}>
                        <div><strong>第{cnums[j]||j+1}案</strong>　提案人：{p.proposer}　案由：{p.caseTitle}</div>
                        {sec==="討論事項"&&<div style={{marginTop:4,color:"#aaa"}}>決議：＿＿＿＿＿＿</div>}
                      </div>
                    ))}
                  </div>
                ))}
                <div style={{fontWeight:700,marginTop:8}}>柒、散會</div>
              </div>
            </div>
            {generated&&<div style={S.ok}>✓ 議程已下載並存檔！可在「歷次存檔」查閱。</div>}
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button style={S.btnO} onClick={()=>setStep(4)}>← 返回修改</button>
              <button style={S.btn} onClick={handleGenerate}>⬇ 下載議程 Word 檔</button>
            </div>
          </div></div>}
        </>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
