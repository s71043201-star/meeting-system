<script>
// docx-js browser - destructure lazily after CDN load
let Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign,
    PageBreak, UnderlineType;

function initDocx() {
  if (!window.docx) { console.error("docx CDN not loaded"); return false; }
  ({ Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
     AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign,
     PageBreak, UnderlineType } = window.docx);
  return true;
}

// ── page layout (A4, DXA: 1440 = 1 inch, 567 = 1 cm) ──────────
const PAGE_W   = 11906;                   // A4 width
const ML       = 1795;                    // left  3.17 cm
const MR       = 1418;                    // right 2.5  cm
const MT       =  794;                    // top   1.4  cm
const MB       =  623;                    // bottom 1.1 cm
const BODY_W   = PAGE_W - ML - MR;       // 8693 usable text width
const TABLE_W  = BODY_W + 600;            // tables wider by ~1cm each side

const KAI = "標楷體";
const PT  = n => n * 2;                   // half-points

// ── borders ─────────────────────────────────────────────────────
const bNone  = { style: BorderStyle.NONE,   size: 0, color: "FFFFFF" };
const bThin  = { style: BorderStyle.SINGLE, size: 4, color: "000000" };
const all    = b => ({ top:b, bottom:b, left:b, right:b });
const noBdr  = all(bNone);
const thinBdr = all(bThin);
const hdrBdr  = all({ style: BorderStyle.SINGLE, size: 4, color: "4472C4" });

// ── spacing: fixed 16 pt line, controllable before/after ────────
const sp = (before=0, after=0) => ({ before, after, line: 320, lineRule: "exact" });

// ── paragraph helpers ────────────────────────────────────────────
const run = (text, size=12, bold=false, color=undefined) =>
  new TextRun({ text, font: KAI, size: PT(size), bold, color });

function para(text, opts={}) {
  const { size=12, bold=false, align=AlignmentType.LEFT, indent=0, before=0, after=60, color } = opts;
  return new Paragraph({
    alignment: align,
    spacing: sp(before, after),
    indent: indent ? { left: indent } : undefined,
    children: [run(text, size, bold, color)]
  });
}
const ctrPara = (text, size=12, bold=false) => para(text, { size, bold, align: AlignmentType.CENTER });
const h2Para  = text => para(text, { size: 14, bold: true, before: 200, after: 60 });
const h3Para  = (text, indent=480) => para(text, { size: 12, indent, before: 120, after: 40 });
const emptyP  = () => para("", { size: 12, after: 0 });

// ── cell builder ─────────────────────────────────────────────────
function cell(text, w, opts={}) {
  const { bold=false, size=12, shade, borders=thinBdr, span, valign=VerticalAlign.CENTER, color } = opts;
  const texts = Array.isArray(text) ? text : [text];
  return new TableCell({
    width: w ? { size: w, type: WidthType.DXA } : undefined,
    borders,
    shading: shade ? { fill: shade, type: ShadingType.CLEAR } : undefined,
    verticalAlign: valign,
    columnSpan: span,
    margins: { top: 60, bottom: 60, left: 180, right: 180 },
    children: texts.map(t => new Paragraph({
      spacing: sp(30, 30),
      children: [run(String(t||""), size, bold, color)]
    }))
  });
}

function hdrCell(text, w, span) {
  return cell(text, w, {
    bold: true, size: 12, shade: "BDD7EE", color: "1F3864",
    borders: hdrBdr, span
  });
}

// ── prescription stats ───────────────────────────────────────────
function buildPrescTable(prescStats) {
  if (!prescStats) return [para("（尚未上傳處方資料）", { indent: 480 })];
  const diff = (a, b) => {
    const c = parseFloat(a), p = parseFloat(b);
    if (isNaN(c)||isNaN(p)) return "";
    const d = c - p, isP = String(a).includes("%");
    return d===0 ? "0" : d>0 ? `+${isP?d.toFixed(1)+"%":d}` : `${isP?d.toFixed(1)+"%":d}`;
  };
  const ORDER = ["運動處方","營養處方","社會處方","情緒調適處方"];
  const rows = [
    ...ORDER.map(k => { const r = prescStats.rows.find(x=>x.label===k)||{}; return {label:k,...r}; }),
    { label:"處方開立總數(各處方加總)", isTotal:true, ...prescStats.total }
  ];
  // col widths for 10 cols: label + 9 data
  const lw = 2600, dw = Math.floor((TABLE_W - lw) / 9);
  const rem = TABLE_W - lw - dw * 9;
  const cw = [lw, dw, dw, dw, dw, dw, dw, dw, dw, dw + rem];

  return [new Table({
    width: { size: TABLE_W, type: WidthType.DXA }, columnWidths: cw,
    rows: [
      new TableRow({ children: [
        hdrCell("健康處方類別", cw[0]),
        hdrCell("處方數", cw[1]+cw[2]+cw[3], 3),
        hdrCell("已執行處方數", cw[4]+cw[5]+cw[6], 3),
        hdrCell("處方執行率", cw[7]+cw[8]+cw[9], 3),
      ]}),
      new TableRow({ children: [
        cell("", cw[0]),
        ...["本週","上週","差異","本週","上週","差異","本週","上週","差異"].map((h,i) => hdrCell(h, cw[i+1]))
      ]}),
      ...rows.map(r => new TableRow({ cantSplit: true, children: [
        cell(r.label, cw[0], { size:12, bold: r.isTotal, shade: r.isTotal?"DEEAF1":undefined }),
        ...[r.open, r.prevOpen||0, diff(r.open,r.prevOpen||0),
            r.exec, r.prevExec||0, diff(r.exec,r.prevExec||0),
            r.rate, r.prevRate||"0%", diff(r.rate,r.prevRate||"0%")
           ].map((v,i) => cell(String(v), cw[i+1], { size:12, bold: r.isTotal, shade: r.isTotal?"DEEAF1":undefined }))
      ]}))
    ]
  })];
}

// ── clinic table ─────────────────────────────────────────────────
function buildClinicTable(clinics) {
  if (!clinics||!clinics.length) return [para("（尚未設定診所資料）", { indent: 480 })];
  const GROUPS = ["自有營養師","已媒合","有空間待媒合","無空間"];
  // 9 cols: 分類, 名稱, 教學時間, 電子簽章, 營養空間, 禮券, 開立, 執行, 備註
  const cw = [700, 1900, 1200, 700, 700, 600, 700, 700, TABLE_W - 700-1900-1200-700-700-600-700-700];
  
  const dataRows = [];
  GROUPS.forEach(grp => {
    const items = clinics.filter(c => c.group === grp);
    if (!items.length) return;
    items.forEach((c, i) => {
      dataRows.push(new TableRow({ children: [
        i === 0 ? new TableCell({
          width: { size: cw[0], type: WidthType.DXA }, rowSpan: items.length,
          borders: thinBdr, verticalAlign: VerticalAlign.CENTER,
          shading: { fill: "DEEAF1", type: ShadingType.CLEAR },
          margins: { top: 60, bottom: 60, left: 100, right: 100 },
          children: [new Paragraph({
            alignment: AlignmentType.CENTER, spacing: sp(30,30),
            children: [run(grp, 12, true, "1F3864")]
          })]
        }) : null,
        cell(c.name||"",          cw[1], { size: 12 }),
        cell(c.teachTime||"",     cw[2], { size: 12 }),
        cell(c.eSig?"V":"",       cw[3], { size: 12 }),
        cell(c.nutrition?"V":"",  cw[4], { size: 12 }),
        cell(c.coupon?"V":"",     cw[5], { size: 12 }),
        cell(String(c.openCount||0), cw[6], { bold: true, size: 12 }),
        cell(String(c.execCount||0), cw[7], { bold: true, size: 12 }),
        cell(c.note||"",          cw[8], { size: 12 }),
      ].filter(Boolean)}));
    });
  });

  return [new Table({
    width: { size: TABLE_W, type: WidthType.DXA }, columnWidths: cw,
    rows: [
      new TableRow({ children: [
        hdrCell("分類",cw[0]), hdrCell("診所名稱",cw[1]), hdrCell("預計實地教學時間",cw[2]),
        hdrCell("電子簽章",cw[3]), hdrCell("營養空間",cw[4]), hdrCell("禮券",cw[5]),
        hdrCell("開立",cw[6]), hdrCell("執行",cw[7]), hdrCell("備註",cw[8]),
      ]}),
      ...dataRows
    ]
  })];
}

// ── generic simple table ─────────────────────────────────────────
function buildSimpleTable(rows, cols, colWidths) {
  const filtered = (rows||[]).filter(r => r._keep !== false);
  if (!filtered.length) return [para("（無資料）", { indent: 480 })];
  const keys = cols.map((_, i) => i); // use positional
  return [new Table({
    width: { size: TABLE_W, type: WidthType.DXA }, columnWidths: colWidths,
    rows: [
      new TableRow({ children: cols.map((c,i) => hdrCell(c, colWidths[i])) }),
      ...filtered.map(r => {
        const vals = Object.entries(r)
          .filter(([k]) => !k.startsWith('_'))
          .map(([,v]) => v);
        return new TableRow({ children: cols.map((_,i) => cell(String(vals[i]||""), colWidths[i], { size: 12 })) });
      })
    ]
  })];
}

// ── work report table ─────────────────────────────────────────────
function buildWorkTable(reports) {
  if (!reports||!reports.length) return [para("（尚未填寫工作進度）", { indent: 480 })];
  const lw = 1400, rest = TABLE_W - lw;
  const cw = [lw, Math.floor(rest/2), Math.ceil(rest/2)];
  return [new Table({
    width: { size: TABLE_W, type: WidthType.DXA }, columnWidths: cw,
    rows: [
      new TableRow({ children: [hdrCell("報告人",cw[0]), hdrCell("近期工作執行情形",cw[1]), hdrCell("未來工作重點規劃",cw[2])] }),
      ...reports.map(r => new TableRow({ children: [
        cell(r.name||"", cw[0], { bold: true, size: 12 }),
        cell((r.recent||"").split("\n"), cw[1], { size: 12 }),
        cell((r.plan||"").split("\n"), cw[2], { size: 12 }),
      ]}))
    ]
  })];
}

// ── schedule / visit tables ───────────────────────────────────────
function buildScheduleTable(rows) {
  const filtered = (rows||[]).filter(r=>r._keep!==false);
  if (!filtered.length) return [para("（無）", { indent: 480 })];
  const cw = [2000, TABLE_W-2000-1800, 1800];
  return [new Table({
    width: { size: TABLE_W, type: WidthType.DXA }, columnWidths: cw,
    rows: [
      new TableRow({ children: [hdrCell("時間",cw[0]),hdrCell("會議名稱",cw[1]),hdrCell("地點",cw[2])] }),
      ...filtered.map(r => new TableRow({ children: [cell(r.date||"",cw[0],{size:12}),cell(r.name||"",cw[1],{size:12}),cell(r.location||"",cw[2],{size:12})] }))
    ]
  })];
}

function buildVisitTable(rows) {
  const filtered = (rows||[]).filter(r=>r._keep!==false);
  if (!filtered.length) return [para("（無）", { indent: 480 })];
  const cw = [2200, TABLE_W-2200-1400, 1400];
  return [new Table({
    width: { size: TABLE_W, type: WidthType.DXA }, columnWidths: cw,
    rows: [
      new TableRow({ children: [hdrCell("時間",cw[0]),hdrCell("拜會單位及人員",cw[1]),hdrCell("執行狀況",cw[2])] }),
      ...filtered.map(r => new TableRow({ children: [cell(r.date||"",cw[0],{size:12}),cell(r.unit||"",cw[1],{size:12}),cell(r.status||"",cw[2],{size:12})] }))
    ]
  })];
}

// ── tracked items: group by meeting, show full source + caseTitle ─
function buildTrackedItems(tracked) {
  if (!tracked||!tracked.length) return [para("（本次無列管追蹤事項）", { indent: 480 })];

  // Group by meeting name (strip item reference to get meeting name)
  const groups = {};
  tracked.forEach(item => {
    const src = item.source || "";
    // Extract meeting name: everything before 臨時動議/討論事項/報告事項
    const meetKey = src.replace(/(臨時動議|討論事項|報告事項).*$/, "").trim() || src;
    if (!groups[meetKey]) groups[meetKey] = [];
    groups[meetKey].push(item);
  });

  const elements = [];
  const cw_item = 1200;
  const cw_case = 2000;
  const cw_dec  = Math.floor((TABLE_W - cw_item - cw_case) / 2);
  const cw_track = TABLE_W - cw_item - cw_case - cw_dec;
  const cw = [cw_item, cw_case, cw_dec, cw_track];

  Object.entries(groups).forEach(([meetingName, items]) => {
    elements.push(new Table({
      width: { size: TABLE_W, type: WidthType.DXA }, columnWidths: cw,
      rows: [
        // Meeting name spanning header
        new TableRow({ children: [
          new TableCell({
            columnSpan: 4, borders: thinBdr,
            shading: { fill: "BDD7EE", type: ShadingType.CLEAR },
            margins: { top: 60, bottom: 60, left: 180, right: 180 },
            children: [new Paragraph({ spacing: sp(40,40), children: [run(
            meetingName.includes("會議") ? meetingName : meetingName + "　內部工作會議",
            12, true, "1F3864")] })]
          })
        ]}),
        // Column headers
        new TableRow({ children: [
          hdrCell("項次", cw[0]),
          hdrCell("案由", cw[1]),
          hdrCell("決議事項", cw[2]),
          hdrCell("追蹤辦理情形", cw[3]),
        ]}),
        // Data rows
        ...items.map(item => {
          const itemRef = (item.source||"").replace(/^.*?((?:臨時動議|討論事項|報告事項).*)$/, "$1") || item.source || "";
          const trackText = item.mode==="decision" ? "依決議辦理。" : (item.customText?.trim()||"（待填寫）");
          return new TableRow({ cantSplit: true, children: [
            cell(itemRef, cw[0], { size: 12 }),
            cell(item.caseTitle||"", cw[1], { size: 12 }),
            cell((item.content||""), cw[2], { size: 12 }),
            cell(trackText, cw[3], { size: 12, shade: "DEEAF1" }),
          ]});
        })
      ]
    }));
    elements.push(emptyP());
  });
  return elements;
}

// ── proposals: pure text, consistent format ───────────────────────
function buildProposals(items, isDiscussion) {
  const cnums = ["一","二","三","四","五","六","七","八","九","十"];
  const INDENT = 480;
  const result = [];
  items.forEach((p, i) => {
    // 第X案 (left) + 提案人 (right) via tab
    result.push(new Paragraph({
      spacing: sp(160, 60),
      tabStops: [{ type: "right", position: TABLE_W }],
      children: [
        run(`第${cnums[i]||i+1}案`, 12, true),
        new TextRun("\t"),
        run(`提案人：${p.proposer}`, 12),
      ]
    }));
    // 案由、說明、決議 - same indent, same style, no gap between them
    result.push(new Paragraph({
      spacing: sp(0, 0), indent: { left: INDENT },
      children: [ run("案　由：", 12), run(p.caseTitle||"", 12) ]
    }));
    result.push(new Paragraph({
      spacing: sp(0, 0), indent: { left: INDENT },
      children: [ run("說　明：", 12, true), run(p.description||"", 12) ]
    }));
    if (isDiscussion) {
      result.push(new Paragraph({
        spacing: sp(0, 0), indent: { left: INDENT },
        children: [ run("決　議：", 12, true), run(" ", 12) ]
      }));
    }
    result.push(emptyP());
  });
  return result;
}

// ── main docx builder ─────────────────────────────────────────────
function buildDocx(data) {
  const { info, prescStats, clinics, tracked, proposals, sectionData } = data;
  const sd = sectionData || {};
  const bySection = s => (proposals||[]).filter(p => p.include && p.section === s);

  const pdRows     = (sd.prescriptionDayCourses||[]).filter(r=>r._keep!==false);
  const uninstr    = (sd.uninstructed||[]).filter(r=>r._keep!==false);
  const venues     = (sd.venues||[]).filter(r=>r._keep!==false);
  const potCourses = (sd.potentialCourses||[]).filter(r=>r._keep!==false);
  const workReports= sd.workReports||[];
  const schedules  = sd.schedules||[];
  const visits     = sd.visits||[];
  const courses    = (sd.courses||[]).filter(c=>c._keep!==false);
  const rpt = bySection("報告事項");
  const dis = bySection("討論事項");
  const urg = bySection("臨時動議");

  // course table per type
  const TYPES = ["運動處方","社會處方","情緒調適處方","營養處方"];
  const courseElems = [];
  TYPES.forEach(type => {
    const tc = courses.filter(c=>c.type===type);
    if (!tc.length) return;
    courseElems.push(h3Para(type, 960));
    const lw = 2200, rest = TABLE_W - lw;
    const cw = [lw, 1100, 1000, 2300, rest-1100-1000-2300];
    courseElems.push(new Table({
      width: { size: TABLE_W, type: WidthType.DXA }, columnWidths: cw,
      rows: [
        new TableRow({ children: [hdrCell("課程名稱",cw[0]),hdrCell("講師",cw[1]),hdrCell("時間",cw[2]),hdrCell("日期",cw[3]),hdrCell("授課地點",cw[4])] }),
        ...tc.map(c => new TableRow({ children: [
          cell(c.name||"",cw[0],{size:12}),
          cell(c.instructor||"",cw[1],{size:12}),
          cell(`週${c.weekday||""} ${c.time||""}`,cw[2],{size:12}),
          cell(c.dates||"",cw[3],{size:12}),
          cell(c.location||"",cw[4],{size:12}),
        ]}))
      ]
    }));
    courseElems.push(emptyP());
  });

  // simple table col widths (all must sum to TABLE_W)
  const pd_cw    = [1100, 900, 2400, 1500, TABLE_W-1100-900-2400-1500];
  const un_cw    = [1500, 1200, 1600, 1800, TABLE_W-1500-1200-1600-1800];
  const ve_cw    = [2000, 1200, 1500, 2500, TABLE_W-2000-1200-1500-2500];
  const pot_cw   = [2400, 1300, 1500, 1200, TABLE_W-2400-1300-1500-1200];

  const children = [
    // ── 標題 ──
    ctrPara(info.org, 14, true),
    ctrPara(info.subtitle, 12, false),
    ctrPara(`${info.meetingNo}內部工作會議${info.theme?`：${info.theme}`:""}　會議議程`, 14, true),
    emptyP(),
    para(`時間：${info.date}（星期${info.weekday}）${info.time}`, { size: 12 }),
    para(`地點：${info.location}`, { size: 12 }),
    para(`主席：${info.chair}`, { size: 12, after: 120 }),

    // ── 壹 ──
    h2Para("壹、主席致詞"),
    emptyP(),

    // ── 貳 ──
    h2Para("貳、計畫推動現況"),
    h3Para(`一、現行健康處方開立及執行情形${info.dataDate?`（截至 ${info.dataDate}）`:""}`),
    ...buildPrescTable(prescStats),
    emptyP(),

    h3Para(`二、目前診所拓點現況${info.dataDate?`（截至 ${info.dataDate}）`:""}`),
    ...buildClinicTable(clinics||[]),
    emptyP(),

    h3Para("三、目前課程開設現況"),
    ...(courseElems.length ? courseElems : [para("（尚未輸入課程資料）", { indent: 480 })]),

    h3Para("四、本月份健康處方課程表"),
    para("（詳見附件）", { indent: 960 }),

    h3Para("五、處方活動日課程表"),
    ...buildSimpleTable(pdRows, ["時間","區塊","課程名稱","講師","地點"], pd_cw),
    emptyP(),

    h3Para("六、曾參與說明會但未開課教師名單"),
    ...buildSimpleTable(uninstr, ["教師姓名","課程類型","職稱","推薦單位","預計開立課程"], un_cw),
    emptyP(),

    h3Para("七、潛在場地列表"),
    ...buildSimpleTable(venues, ["場地名稱","租金","空間大小","提供器材","備註"], ve_cw),
    emptyP(),

    h3Para("八、潛在課程及師資列表"),
    ...buildSimpleTable(potCourses, ["課程名稱","講師","類型","狀態","備註"], pot_cw),

function computeStats(rows, cutoffThis, cutoffLast) {
  const ORDER = ["運動處方","營養處方","社會處方","情緒調適處方"];
  const makeWin = s => { if(!s) return null; const e=new Date(s); e.setHours(23,59,59); const st=new Date(s); st.setDate(st.getDate()-6); st.setHours(0,0,0); return {start:st,end:e}; };
  const thisWin=makeWin(cutoffThis), lastWin=makeWin(cutoffLast);
  const mk=()=>{ const s={}; ORDER.forEach(k=>s[k]={open:0,exec:0}); return s; };
  const cumThis=mk(), cumLast=mk();
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; const pt=r[6]; const ex=r[14]; const d=parseDate(r[21]);
    if(!pt||cumThis[pt]===undefined) continue;
    const isEx=ex==="V"||ex==="v"||ex===true;

  const sum=(o,f)=>ORDER.reduce((s,k)=>s+o[k][f],0);
  const rate=(e,o)=>o?(e/o*100).toFixed(1)+"%":"0%";
  return {
    rows:ORDER.map(k=>({label:k,open:cumThis[k].open,exec:cumThis[k].exec,rate:rate(cumThis[k].exec,cumThis[k].open),

      prevOpen:lastWin?sum(cumLast,"open"):0,prevExec:lastWin?sum(cumLast,"exec"):0,prevRate:lastWin?rate(sum(cumLast,"exec"),sum(cumLast,"open")):"0%"}
  };
}

function ImeInput({value, onChange, placeholder, type="text", style: sx}) {
  const id = React.useRef("ime_" + Math.random().toString(36).slice(2));

    if (el && el !== document.activeElement) el.value = value || "";
  });

    const el = document.getElementById(id.current);
    if (!el) return;
    let composing = false;
    const onCS = () => composing = true;
    const onCE = e => { composing = false; onChange(e.target.value); };
    const onInput = e => { if (!composing) onChange(e.target.value); };
    el.addEventListener("compositionstart", onCS);
    el.addEventListener("compositionend", onCE);
    el.addEventListener("input", onInput);
    return () => {
      el.removeEventListener("compositionstart", onCS);
      el.removeEventListener("compositionend", onCE);
      el.removeEventListener("input", onInput);
    };
  }, []);
  const styleStr = sx ? Object.entries(sx).map(([k,v])=>`${k.replace(/([A-Z])/g,'-$1').toLowerCase()}:${v}`).join(';') : '';

function parseCoursesToSchedule(rows) {
  // Direct mapping from Excel columns (no AI needed)
  // Expected columns: 處方類型, 課程名稱, 講師, 星期, 時間, 日期, 授課地點, 課程說明
  // Skip first row if it's an instruction row (contains 填寫說明)
  let dataStart = 1;
  const firstRow = (rows[0] || []).join('');
  if (firstRow.includes('填寫說明') || firstRow.includes('處方類型')) {
    // rows[0] is instruction or already header, check rows[1]
    if (rows[1] && rows[1].join('').includes('處方類型')) {
      dataStart = 2; // skip instruction row and header row
    } else if (firstRow.includes('填寫說明')) {
      dataStart = 2; // skip instruction, row[1] is header
    }
  }

  const result = [];
  for (let i = dataStart; i < rows.length; i++) {
    const r = rows[i];
    if (!r || !r.some(c => c !== "" && c !== null && c !== undefined)) continue;
    const type = String(r[0] || "").trim();
    const name = String(r[1] || "").trim();
    if (!name) continue; // skip empty rows
    result.push({
      type: type || "運動處方",
      name: name,
      instructor: String(r[2] || "").trim(),
      weekday: String(r[3] || "").trim(),
      time: String(r[4] || "").trim(),
      dates: String(r[5] || "").trim(),
      location: String(r[6] || "").trim(),
      description: String(r[7] || "").trim(),
    });
  }
  return result;
}

}

function PersistSection({ title, sectionKey, columns, defaultRow, initialData, onDataChange }) {
  const [rows, setRows] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [lastSaved, setLastSaved] = useState(null);

  useEffect(() => {
    loadSectionData(sectionKey).then(data => {
      if (data && Array.isArray(data) && data.length > 0) {
        setRows(data.map((r,i) => ({ ...r, _keep: r._keep !== false, _id: r._id || Date.now()+i })));
      } else if (initialData && initialData.length > 0) {
        setRows(initialData.map((r,i) => ({ ...r, _id: Date.now()+i })));
      } else {
        setRows([{ ...defaultRow, _keep: true, _id: Date.now() }]);
      }
      setLoaded(true);
    });
  }, [sectionKey]);

  useEffect(() => {
    if (loaded) onDataChange(rows.filter(r => r._keep));
  }, [rows, loaded]);

  const addRow = () => setRows(prev => [...prev, { ...defaultRow, _keep: true, _id: Date.now() + Math.random() }]);
  const updateRow = (i, field, val) => setRows(prev => { const n=[...prev]; n[i]={...n[i],[field]:val}; return n; });
  const removeRow = (i) => setRows(prev => prev.filter((_,j)=>j!==i));

  const handleSave = async () => {
    setSaving(true);
    await saveSectionData(sectionKey, rows);
    setLastSaved(new Date().toLocaleTimeString("zh-TW"));
    setSaving(false);
  };

  if (!loaded) return <div style={{color:"#888",fontSize:12,padding:8}}>載入中…</div>;

  return (
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:12,color:"#555"}}>
          {lastSaved && <span style={{color:"#2e7d32",fontSize:11}}>✓ 已儲存 {lastSaved}</span>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={{...S.btnS(),fontSize:11}} onClick={addRow}>＋ 新增列</button>
          <button style={{...S.btnS("#2e7d32"),fontSize:11}} onClick={handleSave} disabled={saving}>
            {saving?"儲存中…":"💾 儲存至雲端"}
          </button>
        </div>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead>
            <tr>
              <th style={{background:"#2c2416",color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",width:40,textAlign:"center",fontSize:11}}>保留</th>
              {columns.map(c=><th key={c.key} style={{background:"#2c2416",color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",fontSize:11,whiteSpace:"nowrap"}}>{c.label}</th>)}
              <th style={{background:"#2c2416",color:"#e8dfc8",padding:"5px 8px",border:"1px solid #555",width:40,fontSize:11}}>刪除</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((row,i)=>(
              <tr key={row._id||i} style={{background:row._keep?"white":"#f5f5f5",opacity:row._keep?1:0.5}}>
                <td style={{textAlign:"center",border:"1px solid #ddd",padding:"4px"}}>
                  <input type="checkbox" checked={!!row._keep} onChange={e=>updateRow(i,"_keep",e.target.checked)}/>
                </td>
                {columns.map(c=>(
                  <td key={c.key} style={{border:"1px solid #ddd",padding:"2px 4px"}}>
                    {c.type==="select"
                      ? <select value={row[c.key]||""} onChange={e=>updateRow(i,c.key,e.target.value)}
                          style={{width:"100%",border:"none",fontSize:11,background:"transparent",fontFamily:"inherit"}}>
                          {c.options.map(o=><option key={o} value={o}>{o}</option>)}
                        </select>
                      : <input value={row[c.key]||""} onChange={e=>updateRow(i,c.key,e.target.value)}
                          style={{width:"100%",border:"none",fontSize:11,background:"transparent",fontFamily:"inherit"}}
                          placeholder={c.placeholder||""}/>
                    }
                  </td>
                ))}
                <td style={{textAlign:"center",border:"1px solid #ddd",padding:"4px"}}>
                  <button onClick={()=>removeRow(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#aaa",fontSize:14}}>✕</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// CourseScheduleSection
function CourseScheduleSection({ onDataChange }) {
  const [courses, setCourses] = useState([]);
  const [loading, setLoading] = useState("");
  const [loaded, setLoaded] = useState(false);
  const fileRef = useRef();

  useEffect(() => {
    loadSectionData("courses").then(data => {
      if (data && Array.isArray(data)) setCourses(data);
      setLoaded(true);
    });
  }, []);

  useEffect(() => { if(loaded) onDataChange(courses); }, [courses, loaded]);

  const handleExcel = async (file) => {
    if (!file) return;
    setLoading("解析課程 Excel…");
    try {
      const rows = await parseCourseExcel(file);
      const parsed = parseCoursesToSchedule(rows);
      if (parsed.length > 0) {
        setCourses(parsed.map((c,i)=>({...c, _id: Date.now()+i, _keep:true})));
      } else {
        alert("未讀到課程資料，請確認 Excel 格式：\n第一欄=處方類型、第二欄=課程名稱、第三欄=講師...");
      }
    } catch(e) { alert("解析失敗："+e.message); }
    setLoading("");
  };

  const downloadTemplate = () => {
    const ws_data = [
      ["課程名稱","講師","星期","時間","地點","日期（逗號分隔）","類型","課程說明"],
      ["養生太極","龔一誠","二","14:00-16:00","北投社區大學503教室","3/3, 3/10, 3/17, 3/24, 3/31","運動處方","養生太極是綜合太極拳基本功法和養生氣功"],
      ["艾揚格瑜伽基礎+修復","詹國群","一","19:30-21:00","瑜伽之光北投館","3/2, 3/9, 3/16, 3/23, 3/30","運動處方",""],
    ];
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(ws_data);
    ws['!cols'] = [{wch:20},{wch:12},{wch:6},{wch:15},{wch:25},{wch:30},{wch:12},{wch:40}];
    XLSX.utils.book_append_sheet(wb, ws, "課程資料");
    XLSX.writeFile(wb, "課程資料範本.xlsx");
  };

  const updateCourse = (i, field, val) => setCourses(prev => { const n=[...prev]; n[i]={...n[i],[field]:val}; return n; });
  const addCourse = () => setCourses(prev=>[...prev,{name:"",instructor:"",weekday:"",time:"",location:"",dates:"",type:"運動處方",description:"",_keep:true,_id:Date.now()}]);
  const removeCourse = (i) => setCourses(prev=>prev.filter((_,j)=>j!==i));

  const handleSave = async () => {
    await saveSectionData("courses", courses);
    alert("✓ 課程資料已儲存");
  };

  const TYPES = ["運動處方","營養處方","社會處方","情緒調適處方"];

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{...S.drop,padding:"14px 20px",flex:1,minWidth:200,display:"flex",alignItems:"center",gap:12}}
          onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleExcel(e.dataTransfer.files[0]);}}
          onClick={()=>fileRef.current?.click()}>
          <span style={{fontSize:20}}>📊</span>
          <div>
            <div style={{fontWeight:700,fontSize:13}}>上傳課程 Excel</div>
            <div style={{fontSize:11,color:"#888"}}>AI 自動解析整理成課程表</div>
          </div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>{handleExcel(e.target.files[0]);e.target.value="";}}/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <button style={S.btnS("#1565c0")} onClick={downloadTemplate}>⬇ 下載 Excel 範本</button>
          <button style={S.btnS()} onClick={addCourse}>＋ 手動新增課程</button>
          <button style={{...S.btnS("#2e7d32")}} onClick={handleSave}>💾 儲存課程</button>
        </div>
      </div>
      {loading && <div style={{color:"#8b6914",fontSize:12,marginBottom:8}}>⏳ {loading}</div>}
      {courses.length > 0 && (
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:700}}>
            <thead>
              <tr>{["保留","類型","課程名稱","講師","星期","時間","日期","地點","說明",""].map((h,i)=>(
                <th key={i} style={{background:"#2c2416",color:"#e8dfc8",padding:"4px 6px",border:"1px solid #555",whiteSpace:"nowrap",textAlign:"center"}}>{h}</th>
              ))}</tr>
            </thead>
            <tbody>
              {courses.map((c,i)=>(
                <tr key={c._id||i} style={{background:c._keep?"white":"#f5f5f5",opacity:c._keep?1:0.5}}>
                  <td style={{textAlign:"center",border:"1px solid #ddd",padding:"3px"}}>
                    <input type="checkbox" checked={!!c._keep} onChange={e=>updateCourse(i,"_keep",e.target.checked)}/>
                  </td>
                  {["type","name","instructor","weekday","time","dates","location","description"].map(f=>(
                    <td key={f} style={{border:"1px solid #ddd",padding:"2px 4px"}}>
                      {f==="type"
                        ? <select value={c[f]||""} onChange={e=>updateCourse(i,f,e.target.value)}
                            style={{width:"100%",border:"none",fontSize:11,background:"transparent",fontFamily:"inherit"}}>
                            {TYPES.map(t=><option key={t}>{t}</option>)}
                          </select>
                        : <input value={c[f]||""} onChange={e=>updateCourse(i,f,e.target.value)}
                            style={{width:"100%",border:"none",fontSize:11,background:"transparent",fontFamily:"inherit"}}/>
                      }
                    </td>
                  ))}
                  <td style={{textAlign:"center",border:"1px solid #ddd",padding:"3px"}}>
                    <button onClick={()=>removeCourse(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#aaa",fontSize:14}}>✕</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function App() {

  const [prescStats,setPrescStats]=useState(null);

  const [cutoffThis,setCutoffThis]=useState("");
  const [cutoffLast,setCutoffLast]=useState("");
  const [clinics,setClinics]=useState(DEFAULT_CLINICS);
  const [sectionData,setSectionData]=useState({});
  const [workReports,setWorkReports]=useState([]);

  useEffect(()=>{
    loadWorkReports().then(r=>{ setSectionData(prev=>({...prev,workReports:r})); setWorkReports(r); });
  },[]);
  const updateSection=(key,data)=>setSectionData(prev=>({...prev,[key]:data}));
  const [managed,setManaged]=useState([]);
  const [suggested,setSuggested]=useState([]);
  const [proposals,setProposals]=useState([]);
  const minutesRef=useRef(), excelRef=useRef(), proposalRef=useRef();

  const updateManaged=(i,v)=>setManaged(a=>{const n=[...a];n[i]=v;return n;});
  const updateSuggested=(i,v)=>setSuggested(a=>{const n=[...a];n[i]=v;return n;});
  const updateProposal=(i,v)=>setProposals(a=>{const n=[...a];n[i]=v;return n;});
  const removeProposal=(i)=>setProposals(a=>a.filter((_,j)=>j!==i));
  const updateClinic=(id,field,value)=>setClinics(a=>a.map(c=>c.id===id?{...c,[field]:value}:c));

  const recalcStats=useCallback((rows,cThis,cLast)=>{
    const stats=computeStats(rows,cThis||null,cLast||null);
    const clinicMap={};
    const cutoffDate=cThis?new Date(cThis):null;
    for(let i=1;i<rows.length;i++){const r=rows[i];const cn=r[7];const ex=r[14];const od=parseDate(r[21]);if(!cn)continue;if(cutoffDate&&od&&od>cutoffDate)continue;if(!clinicMap[cn])clinicMap[cn]={open:0,exec:0};clinicMap[cn].open++;if(ex==="V"||ex==="v"||ex===true)clinicMap[cn].exec++;}
    setClinics(prev=>prev.map(c=>{const key=Object.keys(clinicMap).find(k=>k.includes(c.name.slice(0,4))||c.name.includes(k.slice(0,4)));if(key)return{...c,openCount:clinicMap[key].open,execCount:clinicMap[key].exec};return c;}));
    setPrescStats(stats);
  },[]);

  useEffect(()=>{ if(excelRows) recalcStats(excelRows,cutoffThis,cutoffLast); },[cutoffThis,cutoffLast]);

  const handleMinutes=async(file)=>{
    if(!file)return;setErr("");setLoading("解析會議紀錄（可能需要30-60秒）…");
    try{
      const data=await extractMinutes(file);
      const managed=(data?.managedItems||[]).filter(i=>i.isManaged).map(i=>({...i,include:true,mode:"decision",customText:""}));
      const suggested=(data?.newItems||[]).filter(i=>i.needsManagement).map(i=>({...i,include:false,mode:"decision",customText:""}));
      if(managed.length===0&&suggested.length===0){
        setErr("⚠ AI 未解析到任何事項，可能是 API 回應格式有誤。已自動跳至下一步，可直接繼續。");
      }
      setManaged(managed);setSuggested(suggested);setMinutesName(file.name);setStep(1);
    }
    catch(e){setErr("解析失敗："+e.message);}setLoading("");
  };
  const handleExcel=async(file)=>{

                  const annotated=approved.map(p=>({id:p.id,proposer:p.proposer,caseTitle:p.caseTitle,description:p.description,section:p.section||"討論事項",include:true}));
                  const existingIds=new Set(proposals.map(x=>x.id));const newOnes=annotated.filter(x=>!existingIds.has(x.id));
                  setProposals(prev=>[...prev,...newOnes]);alert(`已載入 ${newOnes.length} 筆提案`);}catch(e){alert("載入失敗："+e.message);}
                }}>↓ 從平台載入已核可提案</button>
              </div>
              <div style={{...S.lbl,marginBottom:8}}>或手動上傳提案單</div>
              <UploadZone onFile={handleProposal} fileRef={proposalRef} label="拖曳或點擊上傳提案單" sub="支援 PDF、Word (.docx)，可重複上傳多份"/>
              <div style={{fontSize:12,color:C.muted,marginTop:8}}>✦ AI 解析後建議分類，可手動調整</div>
            </div></div>
            {proposals.length>0&&<div style={S.card}><div style={S.ch("#4a1a7a")}>已整合提案（{proposals.length} 項）</div><div style={S.cb}>{proposals.map((p,i)=><ProposalCard key={p.id||i} prop={p} index={i} onChange={updateProposal} onRemove={()=>removeProposal(i)}/>)}</div></div>}
            <div style={{display:"flex",gap:10}}><button style={S.btnO} onClick={()=>setStep(3)}>← 上一步</button><button style={S.btn} onClick={()=>setStep(5)}>{proposals.length===0?"略過，直接產生議程 →":"下一步：產生議程 →"}</button></div>
          </>}

          {/* S5 */}
          {step===5&&<div style={S.card}><div style={S.ch()}>步驟六　預覽議程並下載</div><div style={S.cb}>
            <div style={{border:`2px solid ${C.border}`,borderRadius:2,overflow:"hidden",marginBottom:18}}>
              <div style={{background:C.border,padding:"7px 14px",fontSize:12,color:C.muted,display:"flex",justifyContent:"space-between"}}>
                <span>📄 議程預覽</span><span style={{fontSize:11}}>以下為實際輸出內容</span>
              </div>
              <div style={{padding:"24px 32px",background:"#fff",fontFamily:"'Noto Serif TC',STSong,serif",fontSize:13,lineHeight:2.1}}>
                <div style={{textAlign:"center",fontWeight:700,fontSize:14}}>{info.org}</div>
                <div style={{textAlign:"center",fontSize:12}}>{info.subtitle}</div>
                <div style={{textAlign:"center",fontWeight:700,fontSize:14,marginBottom:4}}>{info.meetingNo}內部工作會議{info.theme?`：${info.theme}`:""}　會議議程</div>
                <div style={{textAlign:"center",fontSize:12,color:C.muted}}>時間：{info.date}（星期{info.weekday}）{info.time}</div>
                <div style={{textAlign:"center",fontSize:12,color:C.muted,marginBottom:8}}>地點：{info.location}　主席：{info.chair}</div>
                <hr style={{borderTop:`1.5px solid ${C.ink}`,margin:"8px 0 12px"}}/>
                <div style={{fontWeight:700,marginBottom:4}}>壹、主席致詞</div>
                <div style={{fontWeight:700,marginBottom:4}}>貳、計畫推動現況</div>
                {["一、現行健康處方開立及執行情形","二、目前診所拓點現況","三、目前課程開設現況","四、本月份健康處方課程表","五、處方活動日課程表","六、曾參與說明會但未開課教師名單","七、潛在場地列表","八、潛在課程及師資列表","九、未成功開課及可直接開課之課程列表"].map(s=><div key={s} style={{paddingLeft:"2em",fontSize:12}}>{s}</div>)}
                <div style={{fontWeight:700,marginBottom:4,marginTop:8}}>參、確認歷次健康台灣深耕計畫會議紀錄暨決議辦理情形</div>
                {[...managed.filter(i=>i.include),...suggested.filter(i=>i.include)].length===0
                  ?<div style={{paddingLeft:"2em",fontSize:12,color:C.muted}}>（本次無列管追蹤事項）</div>
                  :[...managed.filter(i=>i.include),...suggested.filter(i=>i.include)].map((item,j)=>(
                  <div key={j} style={{margin:"6px 2em",padding:"8px 12px",border:`1px solid ${C.border}`,borderRadius:1,fontSize:12}}>
                    <div><strong>【{item.source}】</strong>案由：{item.caseTitle}</div>
                    <div><strong>本次辦理情形：</strong>{item.mode==="decision"?"依決議辦理。":(item.customText||"（待填寫）")}</div>
                  </div>
                ))}
                {[["肆、報告事項","報告事項"],["伍、討論事項","討論事項"],["陸、臨時動議","臨時動議"]].map(([label,sec])=>(
                  <div key={sec}>
                    <div style={{fontWeight:700,marginBottom:4,marginTop:8}}>{label}</div>
                    {proposals.filter(p=>p.include&&p.section===sec).length===0&&sec!=="肆、報告事項"&&<div style={{paddingLeft:"2em",fontSize:12,color:C.muted}}>（無）</div>}
                    {proposals.filter(p=>p.include&&p.section===sec).map((p,j)=>(
                      <div key={j} style={{margin:"4px 2em",padding:"6px 12px",border:`1px solid ${C.border}`,borderRadius:1,fontSize:12,borderLeft:`3px solid ${SC[sec]||C.gold}`}}>
                        <div><strong>第{cnums[j]||j+1}案</strong>　提案人：{p.proposer}　案由：{p.caseTitle}</div>
                        {sec==="討論事項"&&<div style={{marginTop:4,color:"#aaa"}}>決議：＿＿＿＿＿＿</div>}
                      </div>
                    ))}
                  </div>
                ))}
                <div style={{fontWeight:700,marginTop:8}}>柒、散會</div>
              </div>
            </div>
            {generated&&<div style={S.ok}>✓ 議程 .docx 已下載並存檔！可在「歷次存檔」查閱。</div>}
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button style={S.btnO} onClick={()=>setStep(4)}>← 返回修改</button>
              <button style={S.btn} onClick={handleGenerate}>⬇ 下載議程 .docx</button>
            </div>
          </div></div>}
        </>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
